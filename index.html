<script>
let currentUser = null;
let onlineBoards = [];
let savedBoardOrder = JSON.parse(localStorage.getItem('blocko_boards_order')) || [];
let sortableInstance = null;

auth.onAuthStateChanged((user) => {
  const authScreen = document.getElementById('authScreen');
  const dashScreen = document.getElementById('dashboardScreen');
  if (user) {
    currentUser = { id: user.uid, name: user.displayName, avatar: user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName}` };
    authScreen.classList.add('hidden');
    dashScreen.classList.remove('hidden');
    dashScreen.classList.add('flex');
    document.getElementById('dashAvatar').src = currentUser.avatar;
    document.getElementById('dashUserName').innerText = currentUser.name;
    subscribeToBoards(user.uid);
  } else {
    authScreen.classList.remove('hidden');
    dashScreen.classList.add('hidden');
  }
});

function loginWithGoogle() { auth.signInWithPopup(googleProvider); }
function logout() { auth.signOut(); }

// Получение локальных досок
function getLocalBoards() {
  return JSON.parse(localStorage.getItem('blocko_local_boards')) || {};
}

function subscribeToBoards(userId) {
  const grid = document.getElementById('boardsGrid');
  db.collection("boards")
    .where("members", "array-contains", userId)
    .orderBy("createdAt", "desc")
    .onSnapshot((snapshot) => {
      onlineBoards = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderBoardsGrid();
    }, (error) => {
      console.error(error);
      if (error.code === 'failed-precondition') {
        grid.innerHTML = `<div class="col-span-full p-6 bg-amber-50 text-center"><p class="font-bold text-amber-700">Нужна настройка индексов Firebase</p></div>`;
      }
    });
}

function renderBoardsGrid() {
  const grid = document.getElementById('boardsGrid');
  const query = document.getElementById('searchInput')?.value.toLowerCase() || '';
  
  // Слияние онлайн и локальных досок
  const localBoardsObj = getLocalBoards();
  const localBoardsArr = Object.values(localBoardsObj);
  const combinedBoards = [...onlineBoards, ...localBoardsArr];

  let sortedBoards = combinedBoards.sort((a, b) => {
    let indexA = savedBoardOrder.indexOf(a.id);
    let indexB = savedBoardOrder.indexOf(b.id);
    if (indexA === -1) indexA = 999999; 
    if (indexB === -1) indexB = 999999;
    return indexA - indexB;
  });

  const filtered = sortedBoards.filter(b => b.title.toLowerCase().includes(query));
  
  if(document.getElementById('statTotalBoards')) {
      document.getElementById('statTotalBoards').innerText = combinedBoards.length;
      let tasksCount = 0;
      combinedBoards.forEach(b => b.columns?.forEach(c => tasksCount += (c.cards?.length || 0)));
      document.getElementById('statTotalTasks').innerText = tasksCount;
  }

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="col-span-full py-16 text-center text-gray-500">Проекты не найдены. Создайте новый или загрузите.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(data => {
    const isLocal = data.id.startsWith('local_');
    const ownerInfo = data.users && data.users[data.owner] ? data.users[data.owner] : { name: 'Владелец', avatar: generateAvatarById(data.owner) };
    
    // Блок кнопок (зависит от типа доски)
    const actionButtons = isLocal ? `
      <button onclick="event.stopPropagation(); exportLocalBoard('${data.id}')" class="p-1.5 bg-gray-100 dark:bg-gray-900/50 hover:bg-emerald-50 dark:hover:bg-emerald-900/30 text-gray-400 hover:text-emerald-500 rounded-md transition-all" title="Скачать бэкап">
        <i data-lucide="download" class="w-3.5 h-3.5"></i>
      </button>
    ` : `
      <button onclick="event.stopPropagation(); copyBoardId(this, '${data.id}')" class="p-1.5 bg-gray-100 dark:bg-gray-900/50 hover:bg-blue-50 dark:hover:bg-blue-900/30 text-gray-400 hover:text-blue-500 rounded-md transition-all" title="Скопировать ID">
        <i data-lucide="copy" class="w-3.5 h-3.5"></i>
      </button>
      <button onclick="event.stopPropagation(); copyBoardLink(this, '${data.id}')" class="p-1.5 bg-gray-100 dark:bg-gray-900/50 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 text-gray-400 hover:text-indigo-500 rounded-md transition-all" title="Ссылка-приглашение">
        <i data-lucide="link" class="w-3.5 h-3.5"></i>
      </button>
    `;

    return `
    <div data-id="${data.id}" onclick="window.location.href='board.html?b=${data.id}'" class="group bg-white dark:bg-gray-800/80 backdrop-blur-sm border border-gray-200 dark:border-gray-700 p-6 rounded-[2rem] hover:border-blue-400 transition-all duration-300 shadow-sm hover:shadow-xl hover:-translate-y-1 cursor-grab active:cursor-grabbing relative overflow-hidden flex flex-col h-full">
      ${isLocal ? `<span class="absolute top-4 right-4 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-800 text-[9px] font-bold px-2 py-1 rounded-md flex items-center gap-1"><i data-lucide="hard-drive" class="w-3 h-3"></i> ОФЛАЙН</span>` : ''}
      <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
      
      <div class="flex justify-between items-start mb-4">
        <div class="p-3 bg-gradient-to-br from-blue-50 to-indigo-50 dark:from-blue-900/20 dark:to-indigo-900/20 text-blue-500 rounded-2xl shadow-sm border border-blue-100/50"><i data-lucide="kanban-square" class="w-6 h-6"></i></div>
        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity bg-white dark:bg-gray-900 p-1 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
           ${(isLocal || data.owner === currentUser.id) ? `<button onclick="event.stopPropagation(); deleteBoard('${data.id}', ${isLocal})" class="p-1.5 text-gray-400 hover:bg-red-50 hover:text-red-500 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
        </div>
      </div>

      <h3 class="text-xl font-bold mb-3 line-clamp-1 group-hover:text-blue-600 transition-colors">${data.title}</h3>
      
      <div class="flex items-center gap-2 mb-4 bg-gray-50 dark:bg-gray-900/40 p-2 rounded-xl border border-gray-100 dark:border-gray-700">
         <img src="${ownerInfo.avatar}" class="w-6 h-6 rounded-full border border-white shadow-sm">
         <div class="flex flex-col">
           <span class="text-[9px] text-gray-400 font-bold uppercase tracking-wider leading-none">Владелец</span>
           <span class="text-xs font-bold text-gray-700 dark:text-gray-200 leading-tight">${ownerInfo.name}</span>
         </div>
      </div>
      
      <div class="flex items-center gap-1.5 mb-6">
        <span class="text-[10px] text-gray-500 font-mono bg-gray-100 dark:bg-gray-900/50 px-2 py-1.5 rounded-md border border-gray-200/50 select-text cursor-text line-clamp-1" onclick="event.stopPropagation()">${data.id}</span>
        ${actionButtons}
      </div>

      <div class="mt-auto pt-4 border-t border-gray-100 dark:border-gray-700/50 flex justify-between items-end">
        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Команда</span>
        <div class="flex -space-x-2">
           ${isLocal ? `<img src="${currentUser.avatar}" class="w-8 h-8 rounded-full border-2 border-white dark:border-gray-800 shadow-sm" />` : 
             (data.members || []).slice(0,4).map(uid => `<img src="${generateAvatarById(uid)}" class="w-8 h-8 rounded-full border-2 border-white dark:border-gray-800 shadow-sm" />`).join('')
           }
        </div>
      </div>
    </div>
  `}).join('');
  
  lucide.createIcons();

  if (sortableInstance) sortableInstance.destroy();
  sortableInstance = new Sortable(grid, {
    animation: 200, ghostClass: 'sortable-ghost', dragClass: 'sortable-drag', delay: 150, delayOnTouchOnly: true,
    onEnd: function () {
      const items = grid.querySelectorAll('[data-id]');
      savedBoardOrder = Array.from(items).map(el => el.getAttribute('data-id'));
      localStorage.setItem('blocko_boards_order', JSON.stringify(savedBoardOrder));
    }
  });
}

// Модальное окно
function openCreateModal() { document.getElementById('createBoardModal').classList.remove('hidden'); }
function closeCreateModal() { document.getElementById('createBoardModal').classList.add('hidden'); }

async function confirmCreateBoard() {
  const title = document.getElementById('newBoardTitle').value.trim() || "Новый проект";
  const type = document.querySelector('input[name="boardType"]:checked').value;
  
  if (!currentUser) return;

  const newBoard = {
    title, owner: currentUser.id, members: [currentUser.id],
    users: { [currentUser.id]: { name: currentUser.name, avatar: currentUser.avatar, role: 'owner' } },
    columns: [
      { id: Date.now(), name: "Бэклог", color: 'default', cards: [] },
      { id: Date.now()+1, name: "В работе", color: 'blue', cards: [] },
      { id: Date.now()+2, name: "Готово", color: 'green', cards: [] }
    ],
    createdAt: Date.now()
  };

  if (type === 'local') {
    newBoard.id = 'local_' + Date.now();
    const localBoards = getLocalBoards();
    localBoards[newBoard.id] = newBoard;
    localStorage.setItem('blocko_local_boards', JSON.stringify(localBoards));
    window.location.href = `board.html?b=${newBoard.id}`;
  } else {
    newBoard.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    try {
      const docRef = await db.collection("boards").add(newBoard);
      window.location.href = `board.html?b=${docRef.id}`;
    } catch (e) { alert("Ошибка БД!"); }
  }
}

// Импорт / Экспорт локальных досок
function exportLocalBoard(id) {
  const localBoards = getLocalBoards();
  const data = localBoards[id];
  if(!data) return;
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
  const el = document.createElement('a');
  el.setAttribute("href", dataStr);
  el.setAttribute("download", `blocko_backup_${data.title}.json`);
  document.body.appendChild(el);
  el.click();
  el.remove();
}

function importLocalBoard(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if(!imported.columns) throw new Error("Invalid");
      imported.id = 'local_' + Date.now(); // Создаем новый ID чтобы не было конфликтов
      imported.owner = currentUser.id;
      imported.members = [currentUser.id];
      const localBoards = getLocalBoards();
      localBoards[imported.id] = imported;
      localStorage.setItem('blocko_local_boards', JSON.stringify(localBoards));
      renderBoardsGrid();
      alert("Офлайн доска успешно загружена!");
    } catch (err) { alert("Ошибка чтения файла. Это не бэкап Blocko."); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function promptJoinById() {
  const id = prompt("Введите ID проекта:");
  if (id && id.trim() !== '') joinBoardById(id.trim());
}

async function joinBoardById(id) {
  if (id.startsWith('local_')) return alert("Это локальный ID, его нельзя найти в сети.");
  try {
    const docRef = db.collection("boards").doc(id);
    const doc = await docRef.get();
    if (doc.exists) {
      if (doc.data().members?.includes(currentUser.id)) return alert("Вы уже в этом проекте!");
      await docRef.update({
        members: firebase.firestore.FieldValue.arrayUnion(currentUser.id),
        [`users.${currentUser.id}`]: { name: currentUser.name, avatar: currentUser.avatar, role: 'editor' }
      });
      window.location.href = `board.html?b=${id}`;
    } else { alert("Доска не найдена."); }
  } catch (e) { alert("Ошибка доступа."); }
}

function copyBoardId(btn, id) { navigator.clipboard.writeText(id); showToastFeedback(btn, 'check', 'text-green-500'); }
function copyBoardLink(btn, id) {
  const url = window.location.origin + window.location.pathname.replace('index.html', '') + 'board.html?b=' + id;
  navigator.clipboard.writeText(url); showToastFeedback(btn, 'check', 'text-green-500');
}
function showToastFeedback(el, icon, color) {
  const og = el.innerHTML; el.innerHTML = `<i data-lucide="${icon}" class="w-3.5 h-3.5 ${color}"></i>`; lucide.createIcons();
  setTimeout(() => { el.innerHTML = og; lucide.createIcons(); }, 2000);
}

function deleteBoard(id, isLocal) { 
  if(!confirm("Удалить проект навсегда?")) return;
  if(isLocal) {
    const local = getLocalBoards(); delete local[id];
    localStorage.setItem('blocko_local_boards', JSON.stringify(local)); renderBoardsGrid();
  } else { db.collection("boards").doc(id).delete(); }
}

function generateAvatarById(uid) {
  const colors = ['3b82f6', '10b981', 'f59e0b', 'f43f5e', '8b5cf6'];
  return `https://ui-avatars.com/api/?name=${uid.substr(0,2)}&background=${colors[uid.charCodeAt(0)%colors.length]}&color=fff&font-size=0.4`;
}

function shareVia(platform) {
  const url = encodeURIComponent(window.location.origin + window.location.pathname);
  const text = encodeURIComponent("Присоединяйтесь ко мне в Blocko Pro!");
  let sUrl = '';
  switch(platform) {
    case 'telegram': sUrl = `https://t.me/share/url?url=${url}&text=${text}`; break;
    case 'viber': sUrl = `viber://forward?text=${text} ${url}`; break;
    case 'whatsapp': sUrl = `https://wa.me/?text=${text} ${url}`; break;
    case 'facebook': sUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`; break;
    case 'twitter': sUrl = `https://twitter.com/intent/tweet?url=${url}&text=${text}`; break;
    case 'linkedin': sUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`; break;
  }
  if(sUrl) window.open(sUrl, '_blank', 'width=600,height=400');
}

function toggleTheme() { document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); }
</script>
