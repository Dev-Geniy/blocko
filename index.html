<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowBoard - Мои проекты</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  
  <script src="config.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }
    
    /* Анимация загрузки */
    @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .loading-pulse { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>

  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 750: '#2d3748', 850: '#1a202c', 900: '#0f172a', 950: '#0b0f19' } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300">

<div id="authScreen" class="fixed inset-0 z-[100] flex items-center justify-center bg-gray-50 dark:bg-gray-950 transition-opacity duration-500">
  <div class="bg-white dark:bg-gray-900 p-10 rounded-[2rem] w-full max-w-md text-center shadow-2xl border border-gray-200 dark:border-gray-800 transform transition-transform scale-100">
    <div class="mx-auto w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-3xl flex items-center justify-center mb-8 shadow-xl shadow-blue-500/30 text-white">
      <i data-lucide="layers" class="w-12 h-12"></i>
    </div>
    <h1 class="text-4xl font-bold mb-3 tracking-tight">FlowBoard <span class="text-blue-500">Pro</span></h1>
    <p class="text-gray-500 dark:text-gray-400 mb-10 text-sm font-medium">Управляйте проектами вместе в реальном времени</p>
    
    <button id="loginBtn" onclick="loginWithGoogle()" class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:border-blue-400 dark:hover:border-blue-500 hover:shadow-lg text-gray-900 dark:text-white px-6 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all active:scale-95 group">
      <svg class="w-6 h-6 group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Войти через Google
    </button>
    <div id="authLoading" class="hidden mt-4 text-sm font-medium text-gray-500 loading-pulse">Авторизация...</div>
  </div>
</div>

<div id="dashboardScreen" class="hidden flex-col h-screen w-full overflow-y-auto">
  <header class="px-8 py-5 border-b border-gray-200 dark:border-gray-800 bg-white/70 dark:bg-gray-900/70 backdrop-blur-xl flex justify-between items-center sticky top-0 z-10">
    <div class="flex items-center gap-3">
      <div class="bg-gradient-to-br from-blue-500 to-indigo-600 p-2 rounded-xl text-white shadow-md shadow-blue-500/20">
        <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
      </div>
      <h1 class="text-2xl font-bold tracking-tight">Мои проекты</h1>
    </div>
    
    <div class="flex items-center gap-5">
      <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-gray-600 dark:text-gray-400">
        <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
      </button>
      
      <div class="flex items-center gap-3 pl-5 border-l border-gray-200 dark:border-gray-800">
        <div class="text-right hidden sm:block">
          <div id="dashUserName" class="text-sm font-bold leading-tight">User</div>
          <button onclick="logout()" class="text-xs font-medium text-gray-500 hover:text-red-500 transition-colors">Выйти</button>
        </div>
        <img id="dashAvatar" src="" class="w-11 h-11 rounded-full border-2 border-white dark:border-gray-800 shadow-sm" />
      </div>
    </div>
  </header>

  <main class="p-8 max-w-7xl mx-auto w-full">
    <div class="flex justify-between items-end mb-8">
      <div>
        <h2 class="text-3xl font-bold tracking-tight mb-1">Рабочие пространства</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">Выберите проект или создайте новый</p>
      </div>
      <button onclick="createNewBoard()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-2xl text-sm font-bold flex items-center gap-2 shadow-lg shadow-blue-500/25 active:scale-95 transition-all">
        <i data-lucide="plus" class="w-5 h-5"></i> Создать доску
      </button>
    </div>
    
    <div id="boardsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <div class="col-span-full py-20 text-center loading-pulse text-gray-400 font-medium">Загрузка проектов...</div>
    </div>
  </main>
</div>

<script>
// ==========================================
// ИНИЦИАЛИЗАЦИЯ И STATE
// ==========================================
if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
lucide.createIcons();

let currentUser = null;

// ==========================================
// АВТОРИЗАЦИЯ
// ==========================================
auth.onAuthStateChanged((user) => {
  const authScreen = document.getElementById('authScreen');
  const dashScreen = document.getElementById('dashboardScreen');
  
  if (user) {
    currentUser = { id: user.uid, name: user.displayName, avatar: user.photoURL };
    
    // Прячем логин, показываем дашборд
    authScreen.classList.add('opacity-0', 'pointer-events-none');
    setTimeout(() => authScreen.classList.add('hidden'), 500);
    
    dashScreen.classList.remove('hidden');
    dashScreen.classList.add('flex');
    
    // Заполняем профиль
    document.getElementById('dashAvatar').src = currentUser.avatar;
    document.getElementById('dashUserName').innerText = currentUser.name;
    
    loadBoards();
  } else {
    // Показываем логин
    authScreen.classList.remove('hidden', 'opacity-0', 'pointer-events-none');
    dashScreen.classList.add('hidden');
    document.getElementById('loginBtn').classList.remove('hidden');
    document.getElementById('authLoading').classList.add('hidden');
  }
});

function loginWithGoogle() {
  document.getElementById('loginBtn').classList.add('hidden');
  document.getElementById('authLoading').classList.remove('hidden');
  auth.signInWithPopup(googleProvider).catch(error => {
    console.error("Ошибка входа:", error);
    alert("Ошибка авторизации. Попробуйте еще раз.");
    document.getElementById('loginBtn').classList.remove('hidden');
    document.getElementById('authLoading').classList.add('hidden');
  });
}

function logout() { auth.signOut(); }

// ==========================================
// ЗАГРУЗКА ДОСОК ИЗ БАЗЫ
// ==========================================
function loadBoards() {
  // Ищем все доски, где в массиве members есть ID текущего юзера
  db.collection("boards")
    .where("members", "array-contains", currentUser.id)
    .orderBy("createdAt", "desc") // Сортируем от новых к старым
    .onSnapshot(snapshot => {
      const grid = document.getElementById('boardsGrid');
      grid.innerHTML = '';
      
      // Если досок нет
      if (snapshot.empty) { 
        grid.innerHTML = `
          <div class="col-span-full flex flex-col items-center justify-center py-20 border-2 border-dashed border-gray-200 dark:border-gray-800 rounded-[2rem] bg-gray-50/50 dark:bg-gray-900/30">
            <div class="w-16 h-16 bg-gray-100 dark:bg-gray-800 text-gray-400 rounded-full flex items-center justify-center mb-4">
              <i data-lucide="folder-open" class="w-8 h-8"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-700 dark:text-gray-300 mb-2">У вас пока нет проектов</h3>
            <p class="text-sm text-gray-500 mb-6">Создайте первую доску или попросите коллег прислать ссылку-приглашение.</p>
            <button onclick="createNewBoard()" class="text-blue-500 font-bold hover:underline">Создать сейчас →</button>
          </div>
        `;
        lucide.createIcons();
        return; 
      }
      
      // Рендерим карточки досок
      snapshot.forEach(doc => {
        const data = doc.data();
        const date = data.createdAt ? new Date(data.createdAt.toDate()).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }) : 'Только что';
        const isOwner = data.owner === currentUser.id;
        
        grid.innerHTML += `
          <a href="board.html?b=${doc.id}" class="group block bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-6 rounded-3xl hover:border-blue-400 dark:hover:border-blue-500 transition-all shadow-sm hover:shadow-xl hover:-translate-y-1 relative overflow-hidden">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-blue-500 to-indigo-600 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            
            <div class="flex justify-between items-start mb-4">
              <div class="p-3 bg-blue-50 dark:bg-blue-900/20 text-blue-500 rounded-2xl group-hover:scale-110 transition-transform">
                <i data-lucide="kanban-square" class="w-6 h-6"></i>
              </div>
              ${isOwner ? '<span class="text-[10px] font-bold px-2 py-1 bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-500 rounded-lg">Owner</span>' : ''}
            </div>
            
            <h3 class="text-xl font-bold mb-1 text-gray-900 dark:text-white group-hover:text-blue-500 transition-colors line-clamp-1">${data.title || 'Без названия'}</h3>
            <div class="text-xs font-medium text-gray-400 dark:text-gray-500 mb-6">Создано: ${date}</div>
            
            <div class="flex justify-between items-end pt-4 border-t border-gray-100 dark:border-gray-700/50">
              <div class="text-xs font-bold text-gray-500">Участники</div>
              <div class="flex -space-x-2">
                ${data.members.slice(0, 4).map(() => `<div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 border-2 border-white dark:border-gray-800 flex items-center justify-center text-xs text-gray-500 shadow-sm"><i data-lucide="user" class="w-4 h-4"></i></div>`).join('')}
                ${data.members.length > 4 ? `<div class="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-900/50 border-2 border-white dark:border-gray-800 flex items-center justify-center text-[10px] font-bold text-blue-600 dark:text-blue-400 shadow-sm">+${data.members.length - 4}</div>` : ''}
              </div>
            </div>
          </a>
        `;
      });
      lucide.createIcons();
    });
}

// ==========================================
// СОЗДАНИЕ НОВОЙ ДОСКИ
// ==========================================
async function createNewBoard() {
  const title = prompt("Введите название нового проекта:") || "Новый проект";
  
  const newBoard = {
    title: title,
    owner: currentUser.id,
    members: [currentUser.id], // Создатель автоматически становится участником
    columns: [
      { id: Date.now(), name: "Бэклог", color: 'default', cards: [] },
      { id: Date.now()+1, name: "В работе", color: 'blue', cards: [] },
      { id: Date.now()+2, name: "Готово", color: 'green', cards: [] }
    ],
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  
  try {
    // 1. Создаем доску в базе
    const docRef = await db.collection("boards").add(newBoard);
    
    // 2. Отправляем системное сообщение в чат новой доски
    await db.collection("boards").doc(docRef.id).collection("chat").add({ 
      text: `🚀 Проект "${title}" успешно создан! Пригласите команду, отправив им ссылку.`, 
      user: { id: 'system', name: 'FlowBoard Bot', avatar: 'https://ui-avatars.com/api/?name=B&background=10b981&color=fff' }, 
      timestamp: firebase.firestore.FieldValue.serverTimestamp() 
    });

    // 3. Редиректим юзера в рабочую область
    window.location.href = `board.html?b=${docRef.id}`;
  } catch(e) {
    console.error(e);
    alert("Ошибка при создании доски. Проверьте правила Firebase.");
  }
}

// Переключение темы
function toggleTheme() { 
  document.documentElement.classList.toggle('dark'); 
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); 
}
</script>

</body>
</html>
