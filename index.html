<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowBoard Pro - Мои проекты</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="config.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }
    
    @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .loading-pulse { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>

  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 750: '#2d3748', 850: '#1a202c', 900: '#0f172a', 950: '#0b0f19' } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300">

<div id="authScreen" class="fixed inset-0 z-[100] flex items-center justify-center bg-gray-50 dark:bg-gray-950 transition-opacity duration-500">
  <div class="bg-white dark:bg-gray-900 p-10 rounded-[2.5rem] w-full max-w-md text-center shadow-2xl border border-gray-200 dark:border-gray-800">
    <div class="mx-auto w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-3xl flex items-center justify-center mb-8 shadow-xl shadow-blue-500/30 text-white">
      <i data-lucide="layers" class="w-12 h-12"></i>
    </div>
    <h1 class="text-4xl font-bold mb-3 tracking-tight">Blocko <span class="text-blue-500">Pro</span></h1>
    <p class="text-gray-500 dark:text-gray-400 mb-10 text-sm font-medium">Ваше рабочее пространство</p>
    
    <button id="loginBtn" onclick="loginWithGoogle()" class="w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:border-blue-400 dark:hover:border-blue-500 hover:shadow-lg text-gray-900 dark:text-white px-6 py-4 rounded-2xl font-bold flex items-center justify-center gap-3 transition-all active:scale-95 group">
      <svg class="w-6 h-6 group-hover:scale-110 transition-transform" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Войти через Google
    </button>
  </div>
</div>

<div id="dashboardScreen" class="hidden flex-col h-screen w-full overflow-y-auto">
  <header class="px-8 py-5 border-b border-gray-200 dark:border-gray-800 bg-white/70 dark:bg-gray-900/70 backdrop-blur-xl flex justify-between items-center sticky top-0 z-20">
    <div class="flex items-center gap-3">
      <div class="bg-gradient-to-br from-blue-500 to-indigo-600 p-2.5 rounded-xl text-white shadow-md shadow-blue-500/20">
        <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
      </div>
      <h1 class="text-2xl font-bold tracking-tight">Blocko</h1>
    </div>
    
    <div class="flex items-center gap-3">
      <div class="hidden md:flex items-center bg-gray-100 dark:bg-gray-800 rounded-xl px-3 py-2 border border-gray-200 dark:border-gray-700">
        <i data-lucide="search" class="w-4 h-4 text-gray-400 mr-2"></i>
        <input id="searchInput" oninput="renderBoardsGrid()" placeholder="Поиск..." class="bg-transparent outline-none text-sm w-32 dark:text-white" />
      </div>
      <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400">
        <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i><i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
      </button>
      <div class="flex items-center gap-3 pl-3 border-l border-gray-200 dark:border-gray-800">
        <img id="dashAvatar" src="" class="w-9 h-9 rounded-full bg-gray-200" />
      </div>
    </div>
  </header>

  <main class="p-8 max-w-7xl mx-auto w-full flex-1">
    <div class="flex justify-between items-end mb-8">
      <div>
        <h2 class="text-3xl font-bold mb-1">Рабочие пространства</h2>
        <p class="text-sm text-gray-500">Управляйте своими проектами</p>
      </div>
      <div class="flex gap-3">
        <button onclick="joinBoard()" class="bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 px-6 py-3 rounded-2xl text-sm font-bold flex items-center gap-2 transition-all">
          <i data-lucide="link" class="w-5 h-5"></i> Присоединиться
        </button>
        <button onclick="createNewBoard()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-2xl text-sm font-bold flex items-center gap-2 shadow-lg shadow-blue-500/25 active:scale-95 transition-all">
          <i data-lucide="plus" class="w-5 h-5"></i> Создать доску
        </button>
      </div>
    </div>
    
    <div id="boardsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      <div class="col-span-full py-20 text-center loading-pulse text-gray-400">Загрузка проектов...</div>
    </div>
  </main>
</div>

<script>
  lucide.createIcons();
  let currentUser = null;
  let allBoards = [];

  auth.onAuthStateChanged((user) => {
    if (user) {
      currentUser = { id: user.uid, name: user.displayName, avatar: user.photoURL };
      document.getElementById('authScreen').classList.add('hidden');
      document.getElementById('dashboardScreen').classList.remove('hidden');
      document.getElementById('dashboardScreen').classList.add('flex');
      document.getElementById('dashAvatar').src = user.photoURL;
      subscribeToBoards(user.uid);
    } else {
      document.getElementById('authScreen').classList.remove('hidden');
      document.getElementById('dashboardScreen').classList.add('hidden');
    }
  });

  function subscribeToBoards(userId) {
    db.collection("boards")
      .where("members", "array-contains", userId)
      .orderBy("createdAt", "desc")
      .onSnapshot((snapshot) => {
        allBoards = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderBoardsGrid();
      });
  }

  function renderBoardsGrid() {
    const grid = document.getElementById('boardsGrid');
    const q = document.getElementById('searchInput').value.toLowerCase();
    grid.innerHTML = '';

    const filtered = allBoards.filter(b => (b.title || '').toLowerCase().includes(q));

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="col-span-full py-20 text-center text-gray-500">Проектов не найдено.</div>`;
      return;
    }

    filtered.forEach(board => {
      grid.innerHTML += `
        <div onclick="window.location.href='board.html?b=${board.id}'" class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-6 rounded-[2rem] hover:border-blue-400 cursor-pointer shadow-sm relative group transition-all">
          <h3 class="font-bold text-lg mb-2">${board.title}</h3>
          <div class="flex justify-between items-center text-sm text-gray-400">
            <span>${(board.members || []).length} участников</span>
            <button onclick="event.stopPropagation(); deleteBoard('${board.id}')" class="hover:text-red-500">
               <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
      `;
    });
    lucide.createIcons();
  }

  async function createNewBoard() {
    const title = prompt("Название проекта:") || "Новый проект";
    const ref = await db.collection("boards").add({
      title,
      owner: currentUser.id,
      members: [currentUser.id],
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      columns: [{ id: Date.now(), name: "Бэклог", color: 'default', cards: [] }]
    });
    window.location.href = `board.html?b=${ref.id}`;
  }

  async function joinBoard() {
    const boardId = prompt("Введите ID проекта:");
    if (!boardId) return;
    try {
      await db.collection("boards").doc(boardId).update({
        members: firebase.firestore.FieldValue.arrayUnion(currentUser.id)
      });
      window.location.href = `board.html?b=${boardId}`;
    } catch { alert("Ошибка доступа или проект не найден."); }
  }

  function deleteBoard(id) {
    if(confirm("Удалить проект?")) db.collection("boards").doc(id).delete();
  }

  function loginWithGoogle() { auth.signInWithPopup(googleProvider); }
  function logout() { auth.signOut(); }
  function toggleTheme() { document.documentElement.classList.toggle('dark'); }
</script>
</body>
</html>
