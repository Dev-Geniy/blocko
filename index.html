
<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowBoard - Рабочая область</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="config.js"></script> <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }
    .glass-modal { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .sortable-ghost { opacity: 0.4; background-color: #f3f4f6; border: 2px dashed #3b82f6; }
    .dark .sortable-ghost { background-color: #1e293b; border-color: #3b82f6; }
    .md-content h1, .md-content h2 { font-weight: bold; margin-bottom: 0.5rem; }
    .md-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
    .md-content strong { font-weight: 700; color: #3b82f6; }
  </style>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 750: '#2d3748', 850: '#1a202c', 900: '#0f172a', 950: '#0b0f19' } } } } }</script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col overflow-hidden transition-colors duration-300">

<header class="px-6 py-4 border-b border-gray-200 dark:border-gray-800 bg-white/70 dark:bg-gray-900/70 backdrop-blur-md flex justify-between items-center z-20">
  <div class="flex items-center gap-3">
    <a href="index.html" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 transition-colors text-gray-500"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
    <h1 id="boardTitleHeader" class="text-xl font-bold tracking-tight">Загрузка...</h1>
  </div>
  
  <div class="flex-1 flex justify-center mx-4">
    <div class="flex items-center bg-gray-100 dark:bg-gray-800 rounded-full pl-4 pr-1 py-1 border max-w-sm w-full cursor-pointer group" onclick="copyShareLink()">
      <div class="flex-1 truncate text-xs text-gray-500 font-mono" id="shareUrlText">Ссылка</div>
      <button class="bg-white dark:bg-gray-700 p-1.5 rounded-full shadow-sm text-gray-700 dark:text-gray-200 group-hover:bg-blue-50 transition-colors"><i data-lucide="link" class="w-4 h-4"></i></button>
    </div>
  </div>

  <div class="flex gap-2 items-center">
    <button onclick="toggleChat()" class="p-2.5 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-200"><i data-lucide="message-square" class="w-4 h-4"></i></button>
    <button onclick="addColumn()" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-4 py-2.5 rounded-xl flex items-center gap-2 text-sm shadow-lg"><i data-lucide="plus" class="w-4 h-4"></i> Колонку</button>
  </div>
</header>

<div class="flex flex-1 overflow-hidden">
  <main id="mainScroll" class="flex-1 overflow-x-auto overflow-y-hidden p-6 h-full cursor-grab active:cursor-grabbing">
    <div id="board" class="flex gap-6 h-full items-start pb-4 min-w-max"></div>
  </main>

  <aside id="chatSidebar" class="w-80 border-l border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 flex flex-col transition-all duration-300 transform translate-x-full hidden z-10">
    <div class="p-4 border-b flex justify-between items-center">
      <h3 class="font-bold flex items-center gap-2"><i data-lucide="message-circle" class="w-4 h-4 text-blue-500"></i> Чат проекта</h3>
      <button onclick="toggleChat()"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4 text-sm flex flex-col"></div>
    <div class="p-3 border-t bg-white dark:bg-gray-900">
      <input id="chatInput" onkeypress="if(event.key==='Enter') sendChatMessage()" placeholder="Сообщение..." class="w-full px-4 py-2.5 bg-gray-100 dark:bg-gray-800 rounded-xl outline-none text-sm dark:text-white" />
    </div>
  </aside>
</div>

<div id="viewCardModal" class="hidden fixed inset-0 z-50 flex justify-center bg-gray-900/40 dark:bg-black/60 glass-modal overflow-y-auto pt-10 pb-10">
  <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl w-full max-w-2xl shadow-2xl relative my-auto">
    <button onclick="closeViewModal()" class="absolute top-6 right-6 text-gray-400 bg-gray-100 dark:bg-gray-700 p-2 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
    <div class="flex items-center gap-2 mb-4 text-xs font-medium text-gray-400"><img id="viewAuthorAvatar" src="" class="w-6 h-6 rounded-full" /><span id="viewAuthorName">User</span> создал(а) задачу</div>
    <div id="viewTags" class="flex gap-2 mb-3 flex-wrap"></div>
    <h2 id="viewTitle" class="text-3xl font-bold dark:text-white mb-6"></h2>
    <img id="viewImage" src="" class="w-full rounded-xl mb-6 hidden object-cover max-h-80" />
    <div class="bg-gray-50 dark:bg-gray-900/50 rounded-2xl p-6 mb-8 border border-gray-100 dark:border-gray-800">
      <div id="viewDescription" class="md-content text-sm dark:text-gray-300"></div>
    </div>
    <h3 class="text-sm font-bold dark:text-white mb-4 flex items-center gap-2"><i data-lucide="message-square" class="w-4 h-4 text-blue-500"></i> Обсуждение</h3>
    <div id="viewCommentsList" class="space-y-4 mb-4 text-sm"></div>
    <div class="flex gap-3">
      <img id="commentMyAvatar" src="" class="w-9 h-9 rounded-full flex-shrink-0" />
      <div class="flex-1 flex gap-2">
        <input id="viewCommentInput" placeholder="Комментарий..." onkeypress="if(event.key==='Enter') addCommentFromView()" class="flex-1 px-4 py-2 bg-gray-50 dark:bg-gray-900 rounded-xl outline-none text-sm dark:text-white" />
        <button onclick="addCommentFromView()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm"><i data-lucide="send" class="w-4 h-4"></i></button>
      </div>
    </div>
  </div>
</div>

<div id="editCardModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 dark:bg-black/80 glass-modal">
  <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl w-full max-w-2xl shadow-2xl flex flex-col max-h-[90vh]">
    <div class="flex justify-between items-center mb-4"><input id="editTitle" placeholder="Название..." class="text-xl font-bold bg-gray-50 dark:bg-gray-900 px-3 py-2 rounded-lg outline-none w-full dark:text-white" /><button onclick="closeEditModal()" class="ml-4 text-gray-400"><i data-lucide="x" class="w-6 h-6"></i></button></div>
    <div class="flex-1 overflow-y-auto pr-2 space-y-5">
      <div><span class="text-xs text-gray-500 block mb-2">Теги</span><div id="editTagsContainer" class="flex gap-2 flex-wrap"></div></div>
      <div>
        <span class="text-xs text-gray-500 block mb-2">Обложка</span>
        <label id="dropzoneLabel" class="flex flex-col items-center justify-center border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-xl cursor-pointer h-32 relative overflow-hidden">
          <div id="dropzoneText" class="flex flex-col items-center"><i data-lucide="image-plus" class="w-8 h-8 mb-2 text-gray-400"></i><span class="text-sm text-gray-500">Загрузить картинку</span></div>
          <img id="editImagePreview" class="absolute inset-0 w-full h-full object-cover hidden" />
          <input type="file" id="editImage" class="hidden" accept="image/*" />
        </label>
        <div id="uploadStatus" class="text-xs text-blue-500 text-center mt-1"></div>
      </div>
      <textarea id="editDescription" placeholder="Описание (Markdown)" rows="5" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 rounded-xl outline-none text-sm dark:text-white"></textarea>
    </div>
    <div class="flex justify-between items-center mt-6 pt-4 border-t"><button onclick="deleteCard()" class="text-red-500 text-sm font-bold flex items-center gap-2"><i data-lucide="trash-2" class="w-4 h-4"></i> Удалить</button>
      <div class="flex gap-2"><button onclick="closeEditModal()" class="px-5 py-2 rounded-xl text-sm font-bold text-gray-500">Отмена</button><button onclick="saveCard()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-bold">Сохранить</button></div>
    </div>
  </div>
</div>

<div id="colModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-gray-900/40 dark:bg-black/60 glass-modal">
  <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl w-full max-w-sm shadow-2xl">
    <div class="flex justify-between mb-5"><h2 class="text-xl font-bold dark:text-white">Настройки колонки</h2><button onclick="closeColModal()"><i data-lucide="x" class="w-5 h-5 text-gray-400"></i></button></div>
    <input id="colNameInput" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 rounded-xl outline-none mb-5 dark:text-white" />
    <div class="flex justify-between mb-8 px-2" id="colorPicker"></div>
    <div class="flex justify-between items-center pt-4 border-t"><button onclick="deleteColumn()" class="text-red-500 text-sm font-bold">Удалить</button><button onclick="saveColumn()" class="bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-6 py-2 rounded-xl text-sm font-bold">Готово</button></div>
  </div>
</div>

<script>
if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
lucide.createIcons();

// Извлекаем переменные из config.js
const IMGBB_KEY = "22de10db6eb1f3ec3fca012dcc566961";
const AVAILABLE_TAGS = [
  { id: 'bug', name: 'Bug', color: 'bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400 border-red-200' },
  { id: 'feature', name: 'Feature', color: 'bg-blue-100 text-blue-600 dark:bg-blue-900/40 dark:text-blue-400 border-blue-200' },
  { id: 'urgent', name: 'Urgent', color: 'bg-amber-100 text-amber-600 dark:bg-amber-900/40 dark:text-amber-400 border-amber-200' },
  { id: 'design', name: 'Design', color: 'bg-purple-100 text-purple-600 dark:bg-purple-900/40 dark:text-purple-400 border-purple-200' }
];

let currentUser = null;
let BOARD_ID = new URLSearchParams(window.location.search).get('b');
let columns = [], sortableInstances = [];
let currentColumn = null, editingCard = null, viewingCard = null, editingColId = null, selectedColColor = 'default', activeTags = [], pendingImageFile = null;

// ПРОВЕРКА АВТОРИЗАЦИИ
auth.onAuthStateChanged((user) => {
  if (user) {
    currentUser = { id: user.uid, name: user.displayName, avatar: user.photoURL };
    document.getElementById('commentMyAvatar').src = currentUser.avatar;
    if (!BOARD_ID) window.location.href = 'index.html'; // Если нет ID доски, на главную
    else loadBoard();
  } else {
    window.location.href = 'index.html'; // Если не авторизован, на главную
  }
});

function loadBoard() {
  document.getElementById('shareUrlText').innerText = window.location.href;
  const docRef = db.collection("boards").doc(BOARD_ID);
  
  docRef.get().then(doc => {
    if (doc.exists) {
      document.getElementById('boardTitleHeader').innerText = doc.data().title;
      if (!doc.data().members.includes(currentUser.id)) docRef.update({ members: firebase.firestore.FieldValue.arrayUnion(currentUser.id) });
    } else {
      alert("Доска не найдена!"); window.location.href = 'index.html';
    }
  });

  docRef.onSnapshot((doc) => { if (doc.exists) { columns = doc.data().columns || []; render(); } });

  docRef.collection("chat").orderBy("timestamp").limit(50).onSnapshot((snapshot) => {
    const chatBox = document.getElementById("chatMessages");
    chatBox.innerHTML = snapshot.empty ? '<div class="text-center text-xs text-gray-400 mt-4">Чат пуст. Напиши первым!</div>' : '';
    snapshot.forEach(doc => {
      const msg = doc.data(), isMe = msg.user.id === currentUser.id;
      const time = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
      chatBox.innerHTML += `
        <div class="flex gap-2 ${isMe ? 'flex-row-reverse' : ''}">
          <img src="${msg.user.avatar}" class="w-8 h-8 rounded-full bg-gray-200 mt-1" />
          <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[80%]">
            <span class="text-[10px] text-gray-500 mb-1">${isMe ? 'Вы' : msg.user.name} • ${time}</span>
            <div class="${isMe ? 'bg-blue-600 text-white' : 'bg-gray-100 dark:bg-gray-800'} px-4 py-2 rounded-2xl text-sm">${msg.text}</div>
          </div>
        </div>
      `;
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

function persist() { db.collection("boards").doc(BOARD_ID).update({ columns }); }

// --- UI Actions ---
function copyShareLink() { navigator.clipboard.writeText(window.location.href); alert("Ссылка скопирована!"); }
function toggleChat() { document.getElementById('chatSidebar').classList.toggle('hidden'); document.getElementById('chatSidebar').classList.toggle('translate-x-full'); }
function sendChatMessage() {
  const text = document.getElementById('chatInput').value.trim();
  if(text) db.collection("boards").doc(BOARD_ID).collection("chat").add({ text, user: currentUser, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
  document.getElementById('chatInput').value = '';
}

// --- Все модалки и рендер остаются практически без изменений ---
function openViewModal(colId, cardId) {
  const col = columns.find(c => c.id === colId); viewingCard = col.cards.find(c => c.id === cardId); currentColumn = colId;
  document.getElementById('viewCardModal').classList.remove('hidden');
  document.getElementById('viewTitle').innerText = viewingCard.title;
  document.getElementById('viewDescription').innerHTML = viewingCard.description ? marked.parse(viewingCard.description) : 'Нет описания';
  const author = viewingCard.author || { name: 'Аноним', avatar: '' };
  document.getElementById('viewAuthorName').innerText = author.name; document.getElementById('viewAuthorAvatar').src = author.avatar;
  document.getElementById('viewTags').innerHTML = (viewingCard.tags || []).map(tId => { const t = AVAILABLE_TAGS.find(tag => tag.id === tId); return t ? `<span class="px-3 py-1 rounded border text-xs font-bold ${t.color}">${t.name}</span>` : ''; }).join('');
  const imgEl = document.getElementById('viewImage'); if(viewingCard.image) { imgEl.src = viewingCard.image; imgEl.classList.remove('hidden'); } else imgEl.classList.add('hidden');
  renderCommentsView();
}
function closeViewModal() { document.getElementById('viewCardModal').classList.add('hidden'); }

function renderCommentsView() {
  const list = document.getElementById('viewCommentsList');
  list.innerHTML = (viewingCard?.comments || []).length ? viewingCard.comments.map(c => `
    <div class="flex gap-3 bg-gray-50 dark:bg-gray-900/40 p-3 rounded-2xl"><img src="${c.user.avatar}" class="w-8 h-8 rounded-full mt-0.5" />
      <div><div class="flex items-center gap-2 mb-1"><span class="font-bold text-xs">${c.user.name}</span><span class="text-[10px] text-gray-400">${c.time}</span></div>
      <div class="text-sm">${c.text}</div></div></div>
  `).join('') : '<div class="text-gray-400 text-center">Нет комментариев</div>';
}
function addCommentFromView() {
  const text = document.getElementById('viewCommentInput').value.trim();
  if(!text) return;
  if(!viewingCard.comments) viewingCard.comments = [];
  viewingCard.comments.push({ text, user: currentUser, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
  document.getElementById('viewCommentInput').value = '';
  columns = columns.map(col => { if(col.id === currentColumn) col.cards = col.cards.map(c => c.id === viewingCard.id ? viewingCard : c); return col; });
  persist(); renderCommentsView();
}

// Изменение колонок и карточек
function addColumn(){ columns.push({ id: Date.now(), name: "Новая колонка", color: 'default', cards: [] }); persist(); }
function openColModal(id){ editingColId = id; const col = columns.find(c => c.id === id); selectedColColor = col.color || 'default'; document.getElementById('colNameInput').value = col.name; renderColorPicker(); document.getElementById('colModal').classList.remove('hidden'); }
function closeColModal(){ document.getElementById('colModal').classList.add('hidden'); }
function saveColumn() { columns = columns.map(c => c.id === editingColId ? {...c, name: document.getElementById('colNameInput').value, color: selectedColColor} : c); persist(); closeColModal(); }
function deleteColumn() { columns = columns.filter(c => c.id !== editingColId); persist(); closeColModal(); }
function renderColorPicker() { document.getElementById('colorPicker').innerHTML = Object.entries(COL_COLORS).map(([key, data]) => `<button onclick="selectedColColor='${key}'; renderColorPicker()" class="w-10 h-10 rounded-full border-4 transition-all ${selectedColColor === key ? 'border-gray-900 dark:border-white scale-110' : 'border-transparent'}" style="background-color: ${data.hex};"></button>`).join(''); }

// Создание и редактирование карточки
function openEditModal(colId, cardId = null) {
  currentColumn = colId; editingCard = cardId ? columns.find(c => c.id === colId).cards.find(c => c.id === cardId) : null;
  activeTags = editingCard ? [...(editingCard.tags || [])] : []; pendingImageFile = null;
  document.getElementById('editCardModal').classList.remove('hidden');
  document.getElementById('editTitle').value = editingCard?.title || ''; document.getElementById('editDescription').value = editingCard?.description || '';
  document.getElementById('uploadStatus').innerText = ''; const preview = document.getElementById('editImagePreview');
  if (editingCard?.image) { preview.src = editingCard.image; preview.classList.remove('hidden'); document.getElementById('dropzoneText').classList.add('opacity-0'); } 
  else { preview.classList.add('hidden'); document.getElementById('dropzoneText').classList.remove('opacity-0'); }
  renderTagsPicker();
}
function closeEditModal() { document.getElementById('editCardModal').classList.add('hidden'); }
document.getElementById('editImage').addEventListener('change', e => {
  const file = e.target.files[0]; if(file) { pendingImageFile = file; document.getElementById('editImagePreview').src = URL.createObjectURL(file); document.getElementById('editImagePreview').classList.remove('hidden'); document.getElementById('dropzoneText').classList.add('opacity-0'); }
});
function renderTagsPicker() { document.getElementById('editTagsContainer').innerHTML = AVAILABLE_TAGS.map(t => `<button onclick="toggleTag('${t.id}')" class="px-3 py-1.5 rounded-lg text-xs font-bold border ${activeTags.includes(t.id) ? 'border-transparent ' + t.color : 'border-gray-200 text-gray-500'}">${t.name}</button>`).join(''); }
function toggleTag(tagId) { activeTags.includes(tagId) ? activeTags = activeTags.filter(t => t !== tagId) : activeTags.push(tagId); renderTagsPicker(); }

async function saveCard() {
  let imageUrl = editingCard?.image || null;
  if (pendingImageFile) { document.getElementById('uploadStatus').innerText = 'Загрузка...'; const fd = new FormData(); fd.append('image', pendingImageFile); const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body: fd }); const data = await res.json(); imageUrl = data.data.url; }
  const cardObj = { id: editingCard ? editingCard.id : Date.now(), title: document.getElementById('editTitle').value || 'Без названия', description: document.getElementById('editDescription').value, tags: activeTags, image: imageUrl, comments: editingCard?.comments || [], author: editingCard?.author || currentUser };
  columns = columns.map(col => { if(col.id === currentColumn) { if(editingCard) col.cards = col.cards.map(c => c.id === editingCard.id ? cardObj : c); else col.cards.push(cardObj); } return col; });
  persist(); closeEditModal();
}
function deleteCard() { columns = columns.map(col => { if(col.id === currentColumn) col.cards = col.cards.filter(c => c.id !== editingCard.id); return col; }); persist(); closeEditModal(); }

function render() {
  const board = document.getElementById('board'); board.innerHTML = '';
  sortableInstances.forEach(inst => inst.destroy()); sortableInstances = [];
  columns.forEach(col => {
    const colorStyle = COL_COLORS[col.color] || COL_COLORS['default'];
    const wrap = document.createElement('div'); wrap.dataset.id = col.id; wrap.className = `flex-shrink-0 w-[320px] rounded-2xl border flex flex-col max-h-full ${colorStyle.bg} ${colorStyle.border}`;
    const cardsHtml = col.cards.map(c => `
      <div data-id="${c.id}" onclick="openViewModal(${col.id}, ${c.id})" class="card-item bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-3.5 rounded-xl cursor-pointer shadow-sm group relative">
        <button onclick="openEditModal(${col.id}, ${c.id}); event.stopPropagation();" class="absolute top-2 right-2 text-gray-400 hover:text-blue-500 opacity-0 group-hover:opacity-100 bg-white dark:bg-gray-800 p-1.5 rounded-lg border shadow-sm z-10"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
        ${c.image ? `<img src="${c.image}" class="mb-3 rounded-lg w-full h-32 object-cover" />` : ''}
        ${c.tags?.length ? `<div class="flex gap-1 mb-2">${c.tags.map(tId => { const t = AVAILABLE_TAGS.find(tag => tag.id === tId); return t ? `<div class="w-8 h-1.5 rounded-full ${t.color.split(' ')[0]}"></div>` : ''; }).join('')}</div>` : ''}
        <div class="font-bold text-sm leading-snug pr-8 mb-3">${c.title}</div>
        <div class="flex justify-between items-end mt-auto"><div class="flex gap-2 items-center text-gray-400">${c.description ? '<i data-lucide="align-left" class="w-3.5 h-3.5"></i>' : ''}${c.comments?.length ? `<div class="flex items-center gap-1 text-[11px] font-medium"><i data-lucide="message-square" class="w-3.5 h-3.5"></i> ${c.comments.length}</div>` : ''}</div>${c.author ? `<img src="${c.author.avatar}" class="w-5 h-5 rounded-full border border-white" title="${c.author.name}" />` : ''}</div>
      </div>
    `).join('');
    wrap.innerHTML = `
      <div class="p-4 border-b border-gray-200/50 flex justify-between items-center col-handle cursor-grab select-none">
        <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full" style="background-color: ${colorStyle.hex}"></div><h2 class="font-bold text-sm">${col.name}</h2><span class="text-xs font-bold px-2 py-0.5 rounded-full border bg-white/50 dark:bg-black/20">${col.cards.length}</span></div>
        <button onclick="openColModal(${col.id})" class="text-gray-400 hover:text-blue-500 p-1"><i data-lucide="more-horizontal" class="w-5 h-5"></i></button>
      </div>
      <div id="cards-${col.id}" class="p-3 flex-1 overflow-y-auto space-y-3">${cardsHtml}</div>
      <div class="p-3 pt-0"><button onclick="openEditModal(${col.id})" class="w-full py-2.5 rounded-xl flex items-center justify-center gap-2 text-sm font-bold text-gray-500 hover:bg-white/50 border border-transparent"><i data-lucide="plus" class="w-4 h-4"></i> Добавить</button></div>
    `;
    board.appendChild(wrap);
    sortableInstances.push(new Sortable(document.getElementById(`cards-${col.id}`), { group: 'shared', animation: 150, delay: 100, delayOnTouchOnly: true, onEnd: function (evt) { let mCard; columns.find(c=>c.id===Number(evt.from.id.replace('cards-',''))).cards = columns.find(c=>c.id===Number(evt.from.id.replace('cards-',''))).cards.filter(c=>{if(c.id===Number(evt.item.dataset.id)){mCard=c;return false;}return true;}); columns.find(c=>c.id===Number(evt.to.id.replace('cards-',''))).cards.splice(evt.newIndex,0,mCard); persist(); } }));
  });
  sortableInstances.push(new Sortable(board, { animation: 200, handle: '.col-handle', onEnd: function (evt) { columns.splice(evt.newIndex, 0, columns.splice(evt.oldIndex, 1)[0]); persist(); } }));
  lucide.createIcons();
}

// Скролл
const mainScroll = document.getElementById('mainScroll'); let isDown=false, startX, scrollLeft;
mainScroll.addEventListener('mousedown', e => { if(e.target.closest('.card-item') || e.target.closest('button')) return; isDown=true; mainScroll.style.cursor='grabbing'; startX=e.pageX-mainScroll.offsetLeft; scrollLeft=mainScroll.scrollLeft; });
mainScroll.addEventListener('mouseleave', () => { isDown=false; mainScroll.style.cursor='grab'; });
mainScroll.addEventListener('mouseup', () => { isDown=false; mainScroll.style.cursor='grab'; });
mainScroll.addEventListener('mousemove', e => { if(!isDown) return; e.preventDefault(); mainScroll.scrollLeft=scrollLeft-(e.pageX-mainScroll.offsetLeft-startX); });
</script>
</body>
</html>
