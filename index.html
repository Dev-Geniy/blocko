<script>
let currentUser = null;
let allBoards = [];
// Загружаем сохраненный порядок ID из LocalStorage
let savedBoardOrder = JSON.parse(localStorage.getItem('blocko_boards_order')) || [];
let sortableInstance = null;

auth.onAuthStateChanged((user) => {
  const authScreen = document.getElementById('authScreen');
  const dashScreen = document.getElementById('dashboardScreen');
  if (user) {
    currentUser = { id: user.uid, name: user.displayName, avatar: user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName}` };
    authScreen.classList.add('hidden');
    dashScreen.classList.remove('hidden');
    dashScreen.classList.add('flex');
    document.getElementById('dashAvatar').src = currentUser.avatar;
    document.getElementById('dashUserName').innerText = currentUser.name;
    subscribeToBoards(user.uid);
  } else {
    authScreen.classList.remove('hidden');
    dashScreen.classList.add('hidden');
  }
});

function loginWithGoogle() { auth.signInWithPopup(googleProvider); }
function logout() { auth.signOut(); }

function subscribeToBoards(userId) {
  const grid = document.getElementById('boardsGrid');
  
  db.collection("boards")
    .where("members", "array-contains", userId)
    .orderBy("createdAt", "desc")
    .onSnapshot((snapshot) => {
      allBoards = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderBoardsGrid();
    }, (error) => {
      console.error("Критическая ошибка базы:", error);
      if (error.code === 'failed-precondition') {
        grid.innerHTML = `
          <div class="col-span-full p-6 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 rounded-2xl text-center">
            <p class="text-amber-700 dark:text-amber-400 font-bold">Нужна настройка индексов Firebase</p>
            <p class="text-sm opacity-80">Откройте консоль браузера (F12) и перейдите по ссылке для создания.</p>
          </div>`;
      }
    });
}

function renderBoardsGrid() {
  const grid = document.getElementById('boardsGrid');
  const query = document.getElementById('searchInput')?.value.toLowerCase() || '';
  
  // 1. Сортируем доски согласно сохраненному порядку в LocalStorage
  let sortedBoards = [...allBoards].sort((a, b) => {
    let indexA = savedBoardOrder.indexOf(a.id);
    let indexB = savedBoardOrder.indexOf(b.id);
    if (indexA === -1) indexA = 999999; // Новые доски падают в конец
    if (indexB === -1) indexB = 999999;
    return indexA - indexB;
  });

  const filtered = sortedBoards.filter(b => b.title.toLowerCase().includes(query));
  
  // Обновление статистики
  if(document.getElementById('statTotalBoards')) {
      document.getElementById('statTotalBoards').innerText = allBoards.length;
      let tasksCount = 0;
      allBoards.forEach(b => b.columns?.forEach(c => tasksCount += (c.cards?.length || 0)));
      document.getElementById('statTotalTasks').innerText = tasksCount;
  }

  if (filtered.length === 0 && query !== '') {
    grid.innerHTML = `<div class="col-span-full py-16 text-center text-gray-500">Проекты не найдены. Воспользуйтесь кнопкой "Войти по ID".</div>`;
    return;
  }

  grid.innerHTML = filtered.map(data => `
    <div data-id="${data.id}" onclick="window.location.href='board.html?b=${data.id}'" class="group bg-white dark:bg-gray-800/80 backdrop-blur-sm border border-gray-200 dark:border-gray-700 p-6 rounded-[2rem] hover:border-blue-400 dark:hover:border-blue-500 transition-all duration-300 shadow-sm hover:shadow-xl hover:-translate-y-1 cursor-grab active:cursor-grabbing relative overflow-hidden flex flex-col h-full">
      
      <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
      
      <div class="flex justify-between items-start mb-6">
        <div class="p-3 bg-gradient-to-br from-blue-50 to-indigo-50 dark:from-blue-900/20 dark:to-indigo-900/20 text-blue-500 rounded-2xl group-hover:scale-110 transition-transform shadow-sm border border-blue-100/50 dark:border-blue-800/30"><i data-lucide="kanban-square" class="w-6 h-6"></i></div>
        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity bg-white dark:bg-gray-900 p-1 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
           ${data.owner === currentUser.id ? `<button onclick="event.stopPropagation(); deleteBoard('${data.id}')" class="p-1.5 text-gray-400 hover:bg-red-50 dark:hover:bg-red-900/30 hover:text-red-500 rounded-lg transition-colors" title="Удалить проект"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
        </div>
      </div>

      <h3 class="text-xl font-bold mb-2 line-clamp-1 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">${data.title}</h3>
      
      <div class="flex items-center gap-1.5 mb-6">
        <span class="text-[10px] text-gray-500 dark:text-gray-400 font-mono bg-gray-100 dark:bg-gray-900/50 px-2 py-1.5 rounded-md border border-gray-200/50 dark:border-gray-700/50 select-text cursor-text" onclick="event.stopPropagation()">${data.id}</span>
        
        <button onclick="event.stopPropagation(); copyBoardId(this, '${data.id}')" class="p-1.5 bg-gray-100 dark:bg-gray-900/50 hover:bg-blue-50 dark:hover:bg-blue-900/30 border border-gray-200/50 dark:border-gray-700/50 text-gray-400 hover:text-blue-500 rounded-md transition-all" title="Скопировать ID">
          <i data-lucide="copy" class="w-3.5 h-3.5"></i>
        </button>
        
        <button onclick="event.stopPropagation(); copyBoardLink(this, '${data.id}')" class="p-1.5 bg-gray-100 dark:bg-gray-900/50 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 border border-gray-200/50 dark:border-gray-700/50 text-gray-400 hover:text-indigo-500 rounded-md transition-all" title="Скопировать ссылку-приглашение">
          <i data-lucide="link" class="w-3.5 h-3.5"></i>
        </button>
      </div>

      <div class="mt-auto pt-4 border-t border-gray-100 dark:border-gray-700/50 flex justify-between items-end">
        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Команда</span>
        <div class="flex -space-x-2">
           ${(data.members || []).slice(0,4).map(uid => `<img src="${generateAvatarById(uid)}" class="w-8 h-8 rounded-full border-2 border-white dark:border-gray-800 shadow-sm" />`).join('')}
           ${data.members.length > 4 ? `<div class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-700 border-2 border-white dark:border-gray-800 flex items-center justify-center text-[10px] font-bold text-gray-600 dark:text-gray-300 shadow-sm">+${data.members.length - 4}</div>` : ''}
        </div>
      </div>
    </div>
  `).join('');
  
  lucide.createIcons();

  // 2. Инициализация Sortable.js для Drag and Drop
  if (sortableInstance) sortableInstance.destroy();
  
  sortableInstance = new Sortable(grid, {
    animation: 200,
    ghostClass: 'sortable-ghost',
    dragClass: 'sortable-drag',
    delay: 150, // Небольшая задержка, чтобы отличать клик от перетаскивания
    delayOnTouchOnly: true,
    onEnd: function () {
      // Сохраняем новый порядок после перетаскивания
      const items = grid.querySelectorAll('[data-id]');
      savedBoardOrder = Array.from(items).map(el => el.getAttribute('data-id'));
      localStorage.setItem('blocko_boards_order', JSON.stringify(savedBoardOrder));
    }
  });
}

async function createNewBoard() {
  const title = prompt("Название проекта:") || "Новый проект";
  if (!currentUser) return;

  const newBoard = {
    title,
    owner: currentUser.id,
    members: [currentUser.id],
    users: { [currentUser.id]: { name: currentUser.name, avatar: currentUser.avatar, role: 'owner' } },
    columns: [
      { id: Date.now(), name: "Бэклог", color: 'default', cards: [] },
      { id: Date.now()+1, name: "В работе", color: 'blue', cards: [] },
      { id: Date.now()+2, name: "Готово", color: 'green', cards: [] }
    ],
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    const docRef = await db.collection("boards").add(newBoard);
    window.location.href = `board.html?b=${docRef.id}`;
  } catch (e) { alert("Ошибка доступа к базе!"); }
}

// Новая функция: Запрос ID через модальное окно (Prompt)
function promptJoinById() {
  const id = prompt("Введите ID проекта (комбинация букв и цифр):");
  if (id && id.trim() !== '') {
    joinBoardById(id.trim());
  }
}

async function joinBoardById(id) {
  try {
    const docRef = db.collection("boards").doc(id);
    const doc = await docRef.get();
    if (doc.exists) {
      const data = doc.data();
      if (data.members && data.members.includes(currentUser.id)) {
        alert("Вы уже в этом проекте!");
        return;
      }
      await docRef.update({
        members: firebase.firestore.FieldValue.arrayUnion(currentUser.id),
        [`users.${currentUser.id}`]: { name: currentUser.name, avatar: currentUser.avatar, role: 'editor' }
      });
      window.location.href = `board.html?b=${id}`;
    } else { 
      alert("Доска с таким ID не найдена. Проверьте правильность."); 
    }
  } catch (e) { 
    alert("Ошибка доступа или неверный ID."); 
  }
}

function copyBoardId(btnElement, id) { 
  navigator.clipboard.writeText(id); 
  showToastFeedback(btnElement, 'check', 'text-green-500');
}

function copyBoardLink(btnElement, id) {
  const url = window.location.origin + window.location.pathname.replace('index.html', '') + 'board.html?b=' + id;
  navigator.clipboard.writeText(url);
  showToastFeedback(btnElement, 'check', 'text-green-500');
}

// Визуальный фидбэк для кнопок копирования
function showToastFeedback(el, iconName, colorClass) {
  const originalHtml = el.innerHTML;
  el.innerHTML = `<i data-lucide="${iconName}" class="w-3.5 h-3.5 ${colorClass}"></i>`;
  lucide.createIcons();
  setTimeout(() => {
    el.innerHTML = originalHtml;
    lucide.createIcons();
  }, 2000);
}

function deleteBoard(id) { if(confirm("Удалить проект навсегда?")) db.collection("boards").doc(id).delete(); }

function toggleTheme() { 
  document.documentElement.classList.toggle('dark'); 
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); 
}

function generateAvatarById(uid) {
  const colors = ['3b82f6', '10b981', 'f59e0b', 'f43f5e', '8b5cf6'];
  const colorIndex = uid.charCodeAt(0) % colors.length;
  return `https://ui-avatars.com/api/?name=${uid.substr(0,2)}&background=${colors[colorIndex]}&color=fff&font-size=0.4`;
}

// Функция для шеринга в соцсетях
function shareVia(platform) {
  const appUrl = encodeURIComponent(window.location.origin + window.location.pathname);
  const text = encodeURIComponent("Присоединяйтесь ко мне в Blocko Pro — мощном рабочем пространстве для команд!");
  let shareUrl = '';

  switch(platform) {
    case 'telegram': shareUrl = `https://t.me/share/url?url=${appUrl}&text=${text}`; break;
    case 'viber': shareUrl = `viber://forward?text=${text} ${appUrl}`; break;
    case 'whatsapp': shareUrl = `https://wa.me/?text=${text} ${appUrl}`; break;
    case 'facebook': shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${appUrl}`; break;
    case 'twitter': shareUrl = `https://twitter.com/intent/tweet?url=${appUrl}&text=${text}`; break;
    case 'linkedin': shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${appUrl}`; break;
  }
  
  if(shareUrl) window.open(shareUrl, '_blank', 'width=600,height=400');
}
