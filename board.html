<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowBoard - Рабочая область</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="config.js"></script> <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    
    /* Скроллбары */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }
    
    /* Эффекты стекла */
    .glass-modal { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    
    /* Стили перетаскивания SortableJS */
    .sortable-ghost { opacity: 0.3; background-color: #e2e8f0; border: 2px dashed #3b82f6; border-radius: 0.75rem; }
    .dark .sortable-ghost { background-color: #1e293b; border-color: #3b82f6; }
    
    /* ФИШКА: Наклон и тень при перетаскивании карточки */
    .sortable-drag { 
      transform: rotate(2deg) scale(1.02); 
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04) !important; 
      cursor: grabbing !important; 
      z-index: 50;
    }
    
    /* Markdown */
    .md-content h1, .md-content h2 { font-weight: bold; margin-bottom: 0.5rem; color: inherit; }
    .md-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
    .md-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.5rem; }
    .md-content strong { font-weight: 700; color: #3b82f6; }
    .md-content a { color: #3b82f6; text-decoration: underline; }
    .md-content input[type="checkbox"] { margin-right: 0.5rem; accent-color: #3b82f6; }
  </style>

  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 750: '#2d3748', 850: '#1a202c', 900: '#0f172a', 950: '#0b0f19' } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col overflow-hidden transition-colors duration-300">

<header class="px-6 py-4 border-b border-gray-200 dark:border-gray-800 bg-white/70 dark:bg-gray-900/70 backdrop-blur-md flex justify-between items-center z-20">
  <div class="flex items-center gap-3">
    <a href="index.html" class="p-2 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-gray-500 dark:text-gray-400" title="На главную">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </a>
    <h1 id="boardTitleHeader" class="text-xl font-bold tracking-tight">Загрузка проекта...</h1>
  </div>
  
  <div class="flex-1 flex justify-center mx-4">
    <div class="flex items-center bg-gray-100 dark:bg-gray-800 rounded-full pl-4 pr-1 py-1 border border-transparent dark:border-gray-700 max-w-sm w-full cursor-pointer group hover:border-blue-200 dark:hover:border-blue-900 transition-colors" onclick="copyShareLink()" title="Скопировать инвайт-ссылку">
      <div class="flex-1 truncate text-xs text-gray-500 dark:text-gray-400 font-mono select-none" id="shareUrlText">Ссылка</div>
      <button class="bg-white dark:bg-gray-700 p-1.5 rounded-full shadow-sm text-gray-700 dark:text-gray-200 group-hover:bg-blue-50 dark:group-hover:bg-blue-900/50 group-hover:text-blue-500 transition-colors">
        <i data-lucide="link" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <div class="flex gap-2 items-center">
    <button onclick="toggleChat()" class="p-2.5 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-200 dark:hover:bg-blue-800/50 transition-colors shadow-sm relative">
      <i data-lucide="message-square" class="w-4 h-4"></i>
    </button>
    <button onclick="addColumn()" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-4 py-2.5 rounded-xl flex items-center gap-2 text-sm shadow-lg shadow-blue-500/25 active:scale-95 transition-all">
      <i data-lucide="plus" class="w-4 h-4"></i> Колонку
    </button>
  </div>
</header>

<div class="flex flex-1 overflow-hidden">
  <main id="mainScroll" class="flex-1 overflow-x-auto overflow-y-hidden p-6 h-full cursor-grab active:cursor-grabbing">
    <div id="board" class="flex gap-6 h-full items-start pb-4 min-w-max"></div>
  </main>

  <aside id="chatSidebar" class="w-80 border-l border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 flex flex-col transition-all duration-300 transform translate-x-full hidden z-10 shadow-2xl">
    <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center bg-gray-50/50 dark:bg-gray-900/50">
      <h3 class="font-bold flex items-center gap-2 text-gray-800 dark:text-white"><i data-lucide="message-circle" class="w-4 h-4 text-blue-500"></i> Чат проекта</h3>
      <button onclick="toggleChat()" class="text-gray-400 hover:text-red-500 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4 text-sm flex flex-col"></div>
    <div class="p-3 border-t border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900">
      <input id="chatInput" onkeypress="if(event.key==='Enter') sendChatMessage()" placeholder="Сообщение..." class="w-full px-4 py-2.5 bg-gray-100 dark:bg-gray-800 rounded-xl outline-none text-sm dark:text-white focus:ring-2 focus:ring-blue-500 transition-shadow" />
    </div>
  </aside>
</div>

<div id="viewCardModal" class="hidden fixed inset-0 z-50 flex justify-center bg-gray-900/40 dark:bg-black/60 glass-modal overflow-y-auto pt-10 pb-10 opacity-0 transition-opacity duration-200">
  <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl w-full max-w-2xl shadow-2xl relative my-auto border border-gray-200 dark:border-gray-700">
    <button onclick="closeViewModal()" class="absolute top-6 right-6 text-gray-400 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 hover:text-gray-800 dark:hover:text-white p-2 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
    
    <div class="flex items-center gap-2 mb-4 text-xs font-medium text-gray-500 dark:text-gray-400">
      <img id="viewAuthorAvatar" src="" class="w-6 h-6 rounded-full bg-gray-200 shadow-sm" />
      <span id="viewAuthorName" class="text-gray-800 dark:text-gray-200">User</span> создал(а) задачу
    </div>
    
    <div id="viewTags" class="flex gap-2 mb-3 flex-wrap"></div>
    <h2 id="viewTitle" class="text-3xl font-bold text-gray-900 dark:text-white mb-6 leading-tight"></h2>
    
    <img id="viewImage" src="" class="w-full rounded-xl mb-6 hidden object-cover max-h-96 border border-gray-200 dark:border-gray-700 shadow-sm" />
    
    <div class="bg-gray-50 dark:bg-gray-900/50 rounded-2xl p-6 mb-8 border border-gray-100 dark:border-gray-800">
      <div id="viewDescription" class="md-content text-sm text-gray-700 dark:text-gray-300 leading-relaxed"></div>
    </div>
    
    <h3 class="text-sm font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2"><i data-lucide="message-square" class="w-4 h-4 text-blue-500"></i> Обсуждение</h3>
    <div id="viewCommentsList" class="space-y-4 mb-4 text-sm"></div>
    
    <div class="flex gap-3 pt-2">
      <img id="commentMyAvatar" src="" class="w-10 h-10 rounded-full flex-shrink-0 shadow-sm" />
      <div class="flex-1 flex gap-2">
        <input id="viewCommentInput" placeholder="Оставьте комментарий..." onkeypress="if(event.key==='Enter') addCommentFromView()" class="flex-1 px-4 py-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl outline-none text-sm dark:text-white focus:ring-2 focus:ring-blue-500 transition-shadow" />
        <button onclick="addCommentFromView()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2.5 rounded-xl text-sm transition-colors shadow-lg shadow-blue-500/20 active:scale-95"><i data-lucide="send" class="w-4 h-4"></i></button>
      </div>
    </div>
  </div>
</div>

<div id="editCardModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 dark:bg-black/80 glass-modal opacity-0 transition-opacity duration-200">
  <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl w-full max-w-2xl shadow-2xl flex flex-col max-h-[90vh] border border-gray-200 dark:border-gray-700">
    <div class="flex justify-between items-center mb-5 pb-4 border-b border-gray-100 dark:border-gray-700/50">
      <input id="editTitle" placeholder="Введите название задачи..." class="text-2xl font-bold bg-transparent outline-none w-full dark:text-white placeholder-gray-400 dark:placeholder-gray-600" />
      <button onclick="closeEditModal()" class="ml-4 text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 p-2 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    
    <div class="flex-1 overflow-y-auto pr-2 space-y-6">
      <div>
        <span class="text-xs font-bold text-gray-500 uppercase tracking-wider block mb-3">Теги (Labels)</span>
        <div id="editTagsContainer" class="flex gap-2 flex-wrap"></div>
      </div>
      
      <div>
        <span class="text-xs font-bold text-gray-500 uppercase tracking-wider block mb-3">Обложка</span>
        <label id="dropzoneLabel" class="flex flex-col items-center justify-center border-2 border-dashed border-gray-300 dark:border-gray-600 hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 rounded-2xl cursor-pointer h-36 relative overflow-hidden transition-all group bg-gray-50/50 dark:bg-gray-900/30">
          <div id="dropzoneText" class="flex flex-col items-center">
            <div class="p-3 bg-white dark:bg-gray-800 rounded-full shadow-sm mb-2 group-hover:scale-110 transition-transform"><i data-lucide="image-plus" class="w-6 h-6 text-blue-500"></i></div>
            <span class="text-sm font-medium text-gray-600 dark:text-gray-400 group-hover:text-blue-500 transition-colors">Нажмите или перетащите картинку</span>
          </div>
          <img id="editImagePreview" class="absolute inset-0 w-full h-full object-cover hidden" />
          <input type="file" id="editImage" class="hidden" accept="image/*" />
        </label>
        <div id="uploadStatus" class="text-xs font-medium text-blue-500 text-center mt-2"></div>
      </div>
      
      <div>
        <span class="text-xs font-bold text-gray-500 uppercase tracking-wider block mb-3">Описание (Поддерживает Markdown)</span>
        <textarea id="editDescription" placeholder="- [ ] Чеклист 1&#10;- [x] Чеклист 2&#10;**Жирный текст** и *курсив*" rows="5" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl outline-none text-sm font-mono dark:text-gray-300 focus:ring-2 focus:ring-blue-500 transition-shadow resize-y"></textarea>
      </div>
    </div>
    
    <div class="flex justify-between items-center mt-6 pt-5 border-t border-gray-100 dark:border-gray-700/50">
      <button onclick="deleteCard()" class="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 px-4 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition-colors">
        <i data-lucide="trash-2" class="w-4 h-4"></i> Удалить
      </button>
      <div class="flex gap-3">
        <button onclick="closeEditModal()" class="px-5 py-2.5 rounded-xl text-sm font-bold text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">Отмена</button>
        <button onclick="saveCard()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 shadow-lg shadow-blue-500/25 transition-transform active:scale-95">
          <i data-lucide="check" class="w-4 h-4"></i> Сохранить
        </button>
      </div>
    </div>
  </div>
</div>

<div id="colModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-gray-900/40 dark:bg-black/60 glass-modal opacity-0 transition-opacity duration-200">
  <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl w-full max-w-sm shadow-2xl border border-gray-200 dark:border-gray-700">
    <div class="flex justify-between items-center mb-5">
      <h2 class="text-xl font-bold dark:text-white">Настройки колонки</h2>
      <button onclick="closeColModal()" class="p-1.5 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"><i data-lucide="x" class="w-5 h-5 text-gray-400"></i></button>
    </div>
    <span class="text-xs font-bold text-gray-500 uppercase block mb-2">Название</span>
    <input id="colNameInput" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl outline-none mb-6 dark:text-white focus:ring-2 focus:ring-blue-500 transition-shadow" />
    
    <span class="text-xs font-bold text-gray-500 uppercase block mb-3">Цвет шапки</span>
    <div class="flex justify-between mb-8 px-1" id="colorPicker"></div>
    
    <div class="flex justify-between items-center pt-5 border-t border-gray-100 dark:border-gray-700/50">
      <button onclick="deleteColumn()" class="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 px-4 py-2 rounded-xl text-sm font-bold transition-colors">Удалить</button>
      <button onclick="saveColumn()" class="bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-6 py-2.5 rounded-xl text-sm font-bold hover:scale-105 transition-transform shadow-md">Сохранить</button>
    </div>
  </div>
</div>

<script>
// ==========================================
// ИНИЦИАЛИЗАЦИЯ И STATE
// ==========================================
if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
lucide.createIcons();

// МЫ УДАЛИЛИ ОТСЮДА IMGBB_KEY И AVAILABLE_TAGS, ТАК КАК ОНИ УЖЕ ЕСТЬ В CONFIG.JS

let currentUser = null;
let BOARD_ID = new URLSearchParams(window.location.search).get('b');
let columns = [], sortableInstances = [];
let currentColumn = null, editingCard = null, viewingCard = null, editingColId = null;
let selectedColColor = 'default', activeTags = [], pendingImageFile = null;

// ==========================================
// АВТОРИЗАЦИЯ И СИНХРОНИЗАЦИЯ (Firebase)
// ==========================================
auth.onAuthStateChanged((user) => {
  if (user) {
    // На случай, если у Google-аккаунта нет аватарки (чтобы не было пустой картинки)
    const safeAvatar = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName)}&background=3b82f6&color=fff`;
    
    currentUser = { id: user.uid, name: user.displayName, avatar: safeAvatar };
    document.getElementById('commentMyAvatar').src = currentUser.avatar;
    
    if (!BOARD_ID) window.location.href = 'index.html'; 
    else loadBoard();
  } else {
    window.location.href = 'index.html'; 
  }
});

function loadBoard() {
// ... дальше идет твой старый код без изменений ...
  document.getElementById('shareUrlText').innerText = window.location.href;
  const docRef = db.collection("boards").doc(BOARD_ID);
  
  docRef.get().then(doc => {
    if (doc.exists) {
      document.getElementById('boardTitleHeader').innerText = doc.data().title;
      // Добавляем юзера в участники доски, если он перешел по ссылке
      if (!doc.data().members.includes(currentUser.id)) docRef.update({ members: firebase.firestore.FieldValue.arrayUnion(currentUser.id) });
    } else {
      alert("Доска не найдена или удалена!"); window.location.href = 'index.html';
    }
  });

  // Подписка на доску (Real-time)
  docRef.onSnapshot((doc) => { if (doc.exists) { columns = doc.data().columns || []; render(); } });

  // Подписка на чат (Real-time)
  docRef.collection("chat").orderBy("timestamp").limit(50).onSnapshot((snapshot) => {
    const chatBox = document.getElementById("chatMessages");
    chatBox.innerHTML = snapshot.empty ? '<div class="text-center text-xs text-gray-400 mt-4">Чат пуст. Напиши первым!</div>' : '';
    snapshot.forEach(doc => {
      const msg = doc.data(), isMe = msg.user.id === currentUser.id;
      const time = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
      chatBox.innerHTML += `
        <div class="flex gap-2 ${isMe ? 'flex-row-reverse' : ''}">
          <img src="${msg.user.avatar}" class="w-8 h-8 rounded-full bg-gray-200 mt-1 shadow-sm border border-gray-100 dark:border-gray-800" />
          <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[85%]">
            <span class="text-[10px] text-gray-500 font-medium mb-1">${isMe ? 'Вы' : msg.user.name} • ${time}</span>
            <div class="${isMe ? 'bg-blue-600 text-white shadow-md shadow-blue-500/20' : 'bg-gray-100 dark:bg-gray-800 dark:text-gray-200 border border-gray-200 dark:border-gray-700'} px-4 py-2.5 rounded-2xl text-sm leading-relaxed ${isMe ? 'rounded-tr-sm' : 'rounded-tl-sm'}">${msg.text}</div>
          </div>
        </div>
      `;
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

function persist() { db.collection("boards").doc(BOARD_ID).update({ columns }); }

// ==========================================
// UI ЭКШЕНЫ
// ==========================================
function copyShareLink() { navigator.clipboard.writeText(window.location.href); alert("Ссылка скопирована!"); }
function toggleChat() { document.getElementById('chatSidebar').classList.toggle('hidden'); document.getElementById('chatSidebar').classList.toggle('translate-x-full'); }
function sendChatMessage() {
  const text = document.getElementById('chatInput').value.trim();
  if(text) db.collection("boards").doc(BOARD_ID).collection("chat").add({ text, user: currentUser, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
  document.getElementById('chatInput').value = '';
}

// Плавное открытие/закрытие модалок
function toggleModal(modalId, show) {
  const el = document.getElementById(modalId);
  if (show) { el.classList.remove('hidden'); setTimeout(() => el.classList.remove('opacity-0'), 10); } 
  else { el.classList.add('opacity-0'); setTimeout(() => el.classList.add('hidden'), 200); }
}

// ==========================================
// ПРОСМОТР КАРТОЧКИ (VIEW)
// ==========================================
function openViewModal(colId, cardId) {
  const col = columns.find(c => c.id === colId); viewingCard = col.cards.find(c => c.id === cardId); currentColumn = colId;
  document.getElementById('viewTitle').innerText = viewingCard.title;
  document.getElementById('viewDescription').innerHTML = viewingCard.description ? marked.parse(viewingCard.description) : '<span class="text-gray-400 italic">Описание отсутствует</span>';
  
  const author = viewingCard.author || { name: 'Аноним', avatar: '' };
  document.getElementById('viewAuthorName').innerText = author.name; document.getElementById('viewAuthorAvatar').src = author.avatar;
  
  document.getElementById('viewTags').innerHTML = (viewingCard.tags || []).map(tId => { const t = AVAILABLE_TAGS.find(tag => tag.id === tId); return t ? `<span class="px-3 py-1 rounded border text-xs font-bold ${t.color}">${t.name}</span>` : ''; }).join('');
  
  const imgEl = document.getElementById('viewImage'); 
  if(viewingCard.image) { imgEl.src = viewingCard.image; imgEl.classList.remove('hidden'); } else imgEl.classList.add('hidden');
  
  renderCommentsView();
  toggleModal('viewCardModal', true);
}
function closeViewModal() { toggleModal('viewCardModal', false); }

function renderCommentsView() {
  const list = document.getElementById('viewCommentsList');
  list.innerHTML = (viewingCard?.comments || []).length ? viewingCard.comments.map(c => `
    <div class="flex gap-3 bg-gray-50 dark:bg-gray-900/40 p-3.5 rounded-2xl border border-transparent dark:border-gray-800">
      <img src="${c.user.avatar}" class="w-8 h-8 rounded-full flex-shrink-0 mt-0.5 shadow-sm" />
      <div>
        <div class="flex items-center gap-2 mb-1"><span class="font-bold text-xs text-gray-900 dark:text-gray-200">${c.user.name}</span><span class="text-[10px] text-gray-400">${c.time}</span></div>
        <div class="text-sm text-gray-700 dark:text-gray-300 leading-relaxed">${c.text}</div>
      </div>
    </div>
  `).join('') : '<div class="text-gray-400 text-center py-4 bg-gray-50 dark:bg-gray-900/30 rounded-xl">Нет комментариев</div>';
}
function addCommentFromView() {
  const text = document.getElementById('viewCommentInput').value.trim();
  if(!text) return;
  if(!viewingCard.comments) viewingCard.comments = [];
  viewingCard.comments.push({ text, user: currentUser, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
  document.getElementById('viewCommentInput').value = '';
  columns = columns.map(col => { if(col.id === currentColumn) col.cards = col.cards.map(c => c.id === viewingCard.id ? viewingCard : c); return col; });
  persist(); renderCommentsView();
}

// ==========================================
// РЕДАКТОР КОЛОНОК
// ==========================================
function addColumn(){ columns.push({ id: Date.now(), name: "Новая колонка", color: 'default', cards: [] }); persist(); }
function openColModal(id){ editingColId = id; const col = columns.find(c => c.id === id); selectedColColor = col.color || 'default'; document.getElementById('colNameInput').value = col.name; renderColorPicker(); toggleModal('colModal', true); }
function closeColModal(){ toggleModal('colModal', false); }
function saveColumn() { columns = columns.map(c => c.id === editingColId ? {...c, name: document.getElementById('colNameInput').value, color: selectedColColor} : c); persist(); closeColModal(); }
function deleteColumn() { columns = columns.filter(c => c.id !== editingColId); persist(); closeColModal(); }
function renderColorPicker() { document.getElementById('colorPicker').innerHTML = Object.entries(COL_COLORS).map(([key, data]) => `<button onclick="selectedColColor='${key}'; renderColorPicker()" class="w-10 h-10 rounded-full border-4 transition-all shadow-sm ${selectedColColor === key ? 'border-gray-900 dark:border-white scale-110 shadow-md' : 'border-transparent'}" style="background-color: ${data.hex};"></button>`).join(''); }

// ==========================================
// РЕДАКТОР КАРТОЧКИ (EDIT) И DRAG-N-DROP КАРТИНКИ
// ==========================================
function openEditModal(colId, cardId = null) {
  currentColumn = colId; editingCard = cardId ? columns.find(c => c.id === colId).cards.find(c => c.id === cardId) : null;
  activeTags = editingCard ? [...(editingCard.tags || [])] : []; pendingImageFile = null;
  
  document.getElementById('editTitle').value = editingCard?.title || ''; document.getElementById('editDescription').value = editingCard?.description || '';
  document.getElementById('uploadStatus').innerText = ''; 
  const preview = document.getElementById('editImagePreview');
  
  if (editingCard?.image) { preview.src = editingCard.image; preview.classList.remove('hidden'); document.getElementById('dropzoneText').classList.add('opacity-0'); } 
  else { preview.classList.add('hidden'); document.getElementById('dropzoneText').classList.remove('opacity-0'); }
  
  renderTagsPicker();
  toggleModal('editCardModal', true);
}
function closeEditModal() { toggleModal('editCardModal', false); }

// Обработка Drag & Drop для зоны загрузки картинки
const dropzone = document.getElementById('dropzoneLabel');
dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/20'); };
dropzone.ondragleave = (e) => { e.preventDefault(); dropzone.classList.remove('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/20'); };
dropzone.ondrop = (e) => {
  e.preventDefault(); dropzone.classList.remove('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/20');
  const file = e.dataTransfer.files[0];
  handleImageSelection(file);
};
document.getElementById('editImage').addEventListener('change', e => handleImageSelection(e.target.files[0]));

function handleImageSelection(file) {
  if(file && file.type.startsWith('image/')) { 
    pendingImageFile = file; 
    document.getElementById('editImagePreview').src = URL.createObjectURL(file); 
    document.getElementById('editImagePreview').classList.remove('hidden'); 
    document.getElementById('dropzoneText').classList.add('opacity-0'); 
  }
}

function renderTagsPicker() { document.getElementById('editTagsContainer').innerHTML = AVAILABLE_TAGS.map(t => `<button onclick="toggleTag('${t.id}')" class="px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${activeTags.includes(t.id) ? 'border-transparent shadow-sm ' + t.color : 'border-gray-200 dark:border-gray-700 text-gray-500 hover:border-gray-400'}">${t.name}</button>`).join(''); }
function toggleTag(tagId) { activeTags.includes(tagId) ? activeTags = activeTags.filter(t => t !== tagId) : activeTags.push(tagId); renderTagsPicker(); }

async function saveCard() {
  let imageUrl = editingCard?.image || null;
  if (pendingImageFile) { 
    document.getElementById('uploadStatus').innerText = 'Загрузка обложки...'; 
    try {
      const fd = new FormData(); fd.append('image', pendingImageFile); 
      const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body: fd }); 
      const data = await res.json(); 
      imageUrl = data.data.url; 
    } catch(e) {
      document.getElementById('uploadStatus').innerText = 'Ошибка загрузки!'; return;
    }
  }
  const cardObj = { id: editingCard ? editingCard.id : Date.now(), title: document.getElementById('editTitle').value || 'Без названия', description: document.getElementById('editDescription').value, tags: activeTags, image: imageUrl, comments: editingCard?.comments || [], author: editingCard?.author || currentUser };
  columns = columns.map(col => { if(col.id === currentColumn) { if(editingCard) col.cards = col.cards.map(c => c.id === editingCard.id ? cardObj : c); else col.cards.push(cardObj); } return col; });
  persist(); closeEditModal();
}
function deleteCard() { columns = columns.map(col => { if(col.id === currentColumn) col.cards = col.cards.filter(c => c.id !== editingCard.id); return col; }); persist(); closeEditModal(); }

// ==========================================
// РЕНДЕР И SORTABLEJS
// ==========================================
function render() {
  const board = document.getElementById('board'); board.innerHTML = '';
  sortableInstances.forEach(inst => inst.destroy()); sortableInstances = [];
  
  columns.forEach(col => {
    const colorStyle = COL_COLORS[col.color] || COL_COLORS['default'];
    const wrap = document.createElement('div'); wrap.dataset.id = col.id; wrap.className = `flex-shrink-0 w-[320px] rounded-2xl border flex flex-col max-h-full shadow-sm bg-gray-100 dark:bg-gray-800/60 ${colorStyle.border}`;
    
    const cardsHtml = col.cards.map(c => `
      <div data-id="${c.id}" onclick="openViewModal(${col.id}, ${c.id})" class="card-item bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-3.5 rounded-xl cursor-grab shadow-sm hover:shadow-md hover:border-blue-400 dark:hover:border-blue-500 transition-all group relative">
        <button onclick="openEditModal(${col.id}, ${c.id}); event.stopPropagation();" class="absolute top-2 right-2 text-gray-400 hover:text-blue-500 opacity-0 group-hover:opacity-100 bg-white dark:bg-gray-800 p-1.5 rounded-lg border dark:border-gray-700 shadow-sm z-10 transition-opacity"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
        ${c.image ? `<img src="${c.image}" class="mb-3 rounded-lg w-full h-32 object-cover border border-gray-100 dark:border-gray-700/50 pointer-events-none" />` : ''}
        ${c.tags?.length ? `<div class="flex gap-1 mb-2">${c.tags.map(tId => { const t = AVAILABLE_TAGS.find(tag => tag.id === tId); return t ? `<div class="w-8 h-1.5 rounded-full ${t.color.split(' ')[0]}"></div>` : ''; }).join('')}</div>` : ''}
        <div class="font-bold text-sm leading-snug pr-8 mb-3 text-gray-900 dark:text-white">${c.title}</div>
        <div class="flex justify-between items-end mt-auto">
          <div class="flex gap-2 items-center text-gray-400">${c.description ? '<i data-lucide="align-left" class="w-3.5 h-3.5"></i>' : ''}${c.comments?.length ? `<div class="flex items-center gap-1 text-[11px] font-medium"><i data-lucide="message-square" class="w-3.5 h-3.5"></i> ${c.comments.length}</div>` : ''}</div>
          ${c.author ? `<img src="${c.author.avatar}" class="w-5 h-5 rounded-full border border-white dark:border-gray-800 shadow-sm" title="${c.author.name}" />` : ''}
        </div>
      </div>
    `).join('');
    
    wrap.innerHTML = `
      <div class="p-4 border-b border-gray-200/50 dark:border-gray-700/50 flex justify-between items-center col-handle cursor-grab select-none">
        <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full shadow-sm" style="background-color: ${colorStyle.hex}"></div><h2 class="font-bold text-sm text-gray-900 dark:text-white">${col.name}</h2><span class="text-xs font-bold px-2 py-0.5 rounded-full border bg-white/50 dark:bg-black/20 text-gray-600 dark:text-gray-400 border-gray-200/50 dark:border-gray-700/50">${col.cards.length}</span></div>
        <button onclick="openColModal(${col.id})" class="text-gray-400 hover:text-blue-500 p-1 rounded transition-colors"><i data-lucide="more-horizontal" class="w-5 h-5"></i></button>
      </div>
      <div id="cards-${col.id}" class="p-3 flex-1 overflow-y-auto space-y-3 min-h-[50px]">${cardsHtml}</div>
      <div class="p-3 pt-0"><button onclick="openEditModal(${col.id})" class="w-full py-2.5 rounded-xl flex items-center justify-center gap-2 text-sm font-bold text-gray-500 hover:text-gray-800 dark:hover:text-white hover:bg-white/50 dark:hover:bg-black/20 transition-colors"><i data-lucide="plus" class="w-4 h-4"></i> Добавить</button></div>
    `;
    board.appendChild(wrap);
    
    sortableInstances.push(new Sortable(document.getElementById(`cards-${col.id}`), { 
      group: 'shared', animation: 150, delay: 100, delayOnTouchOnly: true, ghostClass: 'sortable-ghost', dragClass: 'sortable-drag', forceFallback: true, fallbackTolerance: 5,
      onEnd: function (evt) { 
        let mCard; 
        columns.find(c=>c.id===Number(evt.from.id.replace('cards-',''))).cards = columns.find(c=>c.id===Number(evt.from.id.replace('cards-',''))).cards.filter(c=>{if(c.id===Number(evt.item.dataset.id)){mCard=c;return false;}return true;}); 
        columns.find(c=>c.id===Number(evt.to.id.replace('cards-',''))).cards.splice(evt.newIndex,0,mCard); 
        persist(); 
      } 
    }));
  });
  
  sortableInstances.push(new Sortable(board, { animation: 200, handle: '.col-handle', ghostClass: 'sortable-ghost', dragClass: 'sortable-drag', forceFallback: true, onEnd: function (evt) { columns.splice(evt.newIndex, 0, columns.splice(evt.oldIndex, 1)[0]); persist(); } }));
  lucide.createIcons();
}

// Скролл (Горизонтальный на всю доску)
const mainScroll = document.getElementById('mainScroll'); let isDown=false, startX, scrollLeft;
mainScroll.addEventListener('mousedown', e => { if(e.target.closest('.card-item') || e.target.closest('button')) return; isDown=true; mainScroll.style.cursor='grabbing'; startX=e.pageX-mainScroll.offsetLeft; scrollLeft=mainScroll.scrollLeft; });
mainScroll.addEventListener('mouseleave', () => { isDown=false; mainScroll.style.cursor='grab'; });
mainScroll.addEventListener('mouseup', () => { isDown=false; mainScroll.style.cursor='grab'; });
mainScroll.addEventListener('mousemove', e => { if(!isDown) return; e.preventDefault(); mainScroll.scrollLeft=scrollLeft-(e.pageX-mainScroll.offsetLeft-startX); });
</script>
</body>
</html>
