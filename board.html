<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowBoard - Рабочая область</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="config.js"></script> 
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    
    /* Скроллбары */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }
    
    /* Эффекты стекла */
    .glass-modal { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    
    /* Стили перетаскивания SortableJS */
    .sortable-ghost { opacity: 0.3; background-color: #e2e8f0; border: 2px dashed #3b82f6; border-radius: 0.75rem; }
    .dark .sortable-ghost { background-color: #1e293b; border-color: #3b82f6; }
    
    /* ФИШКА: Наклон и тень при перетаскивании карточки */
    .sortable-drag { 
      transform: rotate(2deg) scale(1.02); 
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04) !important; 
      cursor: grabbing !important; 
      z-index: 50;
    }
    
    /* Markdown */
    .md-content h1, .md-content h2 { font-weight: bold; margin-bottom: 0.5rem; color: inherit; }
    .md-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.5rem; }
    .md-content ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.5rem; }
    .md-content strong { font-weight: 700; color: #3b82f6; }
    .md-content a { color: #3b82f6; text-decoration: underline; }
    .md-content input[type="checkbox"] { margin-right: 0.5rem; accent-color: #3b82f6; }
  </style>

  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 750: '#2d3748', 850: '#1a202c', 900: '#0f172a', 950: '#0b0f19' } } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col overflow-hidden transition-colors duration-300">

<header class="px-6 py-4 border-b border-gray-200 dark:border-gray-800 bg-white/70 dark:bg-gray-900/70 backdrop-blur-md flex justify-between items-center z-20 relative">
  <div class="flex items-center gap-3">
    <a href="index.html" class="p-2 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-gray-500 dark:text-gray-400" title="На главную">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </a>
    <h1 id="boardTitleHeader" onclick="renameBoard()" class="text-xl font-bold tracking-tight cursor-pointer hover:text-blue-500 hover:underline transition-all" title="Нажмите, чтобы переименовать">Загрузка проекта...</h1>
  </div>
  
  <div class="flex-1 flex justify-center mx-4">
    <div class="flex items-center bg-gray-100 dark:bg-gray-800 rounded-full pl-4 pr-1 py-1 border border-transparent dark:border-gray-700 max-w-sm w-full cursor-pointer group hover:border-blue-200 dark:hover:border-blue-900 transition-colors" onclick="copyShareLink()" title="Скопировать инвайт-ссылку">
      <div class="flex-1 truncate text-xs text-gray-500 dark:text-gray-400 font-mono select-none" id="shareUrlText">Ссылка</div>
      <button class="bg-white dark:bg-gray-700 p-1.5 rounded-full shadow-sm text-gray-700 dark:text-gray-200 group-hover:bg-blue-50 dark:group-hover:bg-blue-900/50 group-hover:text-blue-500 transition-colors">
        <i data-lucide="link" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

<div class="flex gap-2 items-center">
    <button onclick="toggleSettings()" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors shadow-sm relative text-gray-600 dark:text-gray-400 mr-1" title="Настройки доски">
      <i data-lucide="settings" class="w-4 h-4"></i>
    </button>
    
    <button onclick="toggleChat()" class="p-2.5 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-200 dark:hover:bg-blue-800/50 transition-colors shadow-sm relative" title="Чат">
      <i data-lucide="message-square" class="w-4 h-4"></i>
    </button>
    <button onclick="addColumn()" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white px-4 py-2.5 rounded-xl flex items-center gap-2 text-sm shadow-lg shadow-blue-500/25 active:scale-95 transition-all">
      <i data-lucide="plus" class="w-4 h-4"></i> Колонку
    </button>
  </div>
</header>

<div class="flex flex-1 overflow-hidden relative">
  <main id="mainScroll" class="flex-1 overflow-x-auto overflow-y-hidden p-6 h-full cursor-grab active:cursor-grabbing w-full">
    <div id="board" class="flex gap-6 h-full items-start pb-4 min-w-max"></div>
  </main>

  <aside id="chatSidebar" class="absolute right-0 top-0 bottom-0 w-80 sm:w-96 border-l border-gray-200 dark:border-gray-800 bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl flex flex-col transition-transform duration-300 transform translate-x-full z-30 shadow-2xl">
    <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center">
      <h3 class="font-bold flex items-center gap-2 text-gray-800 dark:text-white"><i data-lucide="message-circle" class="w-4 h-4 text-blue-500"></i> Чат проекта</h3>
      <button onclick="toggleChat()" class="text-gray-400 hover:text-red-500 transition-colors bg-gray-100 dark:bg-gray-800 p-1.5 rounded-lg"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div id="chatMessages" class="flex-1 overflow-y-auto min-h-0 p-4 space-y-4 text-sm flex flex-col"></div>
    <div class="p-3 border-t border-gray-200 dark:border-gray-800 bg-white/50 dark:bg-gray-900/50">
      <input id="chatInput" onkeypress="if(event.key==='Enter') sendChatMessage()" placeholder="Сообщение..." class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 rounded-xl outline-none text-sm dark:text-white focus:ring-2 focus:ring-blue-500 transition-shadow" />
    </div>
  </aside>
  <aside id="settingsSidebar" class="absolute right-0 top-0 bottom-0 w-80 sm:w-96 border-l border-gray-200 dark:border-gray-800 bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl flex flex-col transition-transform duration-300 transform translate-x-full z-40 shadow-2xl">

        <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3">Обои проекта</h4>

    </div>
    
    <div class="flex-1 overflow-y-auto pr-2 space-y-6">

<script>
// ==========================================
// ИНИЦИАЛИЗАЦИЯ И STATE
// ==========================================
if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
lucide.createIcons();

let currentUser = null;
let BOARD_ID = new URLSearchParams(window.location.search).get('b');
let columns = [], sortableInstances = [];
let currentColumn = null, editingCard = null, viewingCard = null, editingColId = null;
let selectedColColor = 'default', activeTags = [], pendingImageFile = null, activeChecklist = [];

// ==========================================
// АВТОРИЗАЦИЯ И СИНХРОНИЗАЦИЯ (Firebase)
// ==========================================
auth.onAuthStateChanged((user) => {
  if (user) {
    const safeAvatar = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName)}&background=3b82f6&color=fff`;
    currentUser = { id: user.uid, name: user.displayName, avatar: safeAvatar };
    document.getElementById('commentMyAvatar').src = currentUser.avatar;
    
    if (!BOARD_ID) window.location.href = 'index.html'; 
    else loadBoard();
  } else {
    window.location.href = 'index.html'; 
  }
});

function loadBoard() {
  document.getElementById('shareUrlText').innerText = window.location.href;
  const docRef = db.collection("boards").doc(BOARD_ID);
  
  docRef.get().then(doc => {
    if (doc.exists) {
      document.getElementById('boardTitleHeader').innerText = doc.data().title;
      if (!doc.data().members.includes(currentUser.id)) docRef.update({ members: firebase.firestore.FieldValue.arrayUnion(currentUser.id) });
    } else {
      alert("Доска не найдена или удалена!"); window.location.href = 'index.html';
    }
  });

  docRef.onSnapshot((doc) => { 
    if (doc.exists) { 
      const data = doc.data();
      document.getElementById('boardTitleHeader').innerText = data.title;
      
      // ПРИМЕНЯЕМ ФОН
      if (data.background) {
        document.body.style.backgroundImage = `url('${data.background}')`;
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
        document.body.style.backgroundAttachment = 'fixed';
      } else {
        document.body.style.backgroundImage = 'none';
      }

      columns = data.columns || []; 
      render(); 
    } else {
      window.location.href = 'index.html';
    }
  });

  docRef.collection("chat").orderBy("timestamp").limit(50).onSnapshot((snapshot) => {
    const chatBox = document.getElementById("chatMessages");
    chatBox.innerHTML = snapshot.empty ? '<div class="text-center text-xs text-gray-400 mt-4">Чат пуст. Напиши первым!</div>' : '';
    snapshot.forEach(doc => {
      const msg = doc.data(), isMe = msg.user.id === currentUser.id;
      const time = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
      chatBox.innerHTML += `
        <div class="flex gap-3 ${isMe ? 'flex-row-reverse' : ''}">
          <img src="${msg.user.avatar}" class="w-8 h-8 rounded-full bg-gray-200 mt-1 shadow-sm border border-gray-100 dark:border-gray-800 flex-shrink-0" />
          <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[85%]">
            <span class="text-[10px] text-gray-500 font-medium mb-1 px-1">${isMe ? 'Вы' : msg.user.name} • ${time}</span>
            <div class="${isMe ? 'bg-blue-600 text-white shadow-md shadow-blue-500/20' : 'bg-gray-100 dark:bg-gray-800 dark:text-gray-200 border border-gray-200 dark:border-gray-700'} px-4 py-2.5 rounded-2xl text-sm leading-relaxed break-words w-full ${isMe ? 'rounded-tr-sm' : 'rounded-tl-sm'}">${msg.text}</div>
          </div>
        </div>
      `;
    });
    // Прокрутка чата после обновления (с микро-задержкой для надежности)
    setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 10);
  });
}

function renameBoard() {
  const currentTitle = document.getElementById('boardTitleHeader').innerText;
  const newTitle = prompt("Новое название проекта:", currentTitle);
  if (newTitle && newTitle.trim() !== "" && newTitle !== currentTitle) {
    db.collection("boards").doc(BOARD_ID).update({ title: newTitle.trim() });
  }
}
  
function persist() { db.collection("boards").doc(BOARD_ID).update({ columns }); }

// UI ЭКШЕНЫ
// ==========================================
function copyShareLink() { navigator.clipboard.writeText(window.location.href); alert("Ссылка скопирована!"); }

// Логика боковых панелей (Чат и Настройки)
function toggleChat() { 
  const chat = document.getElementById('chatSidebar');
  const settings = document.getElementById('settingsSidebar');
  if (!settings.classList.contains('translate-x-full')) settings.classList.add('translate-x-full'); // Скрываем настройки, если открыты
  chat.classList.toggle('translate-x-full'); 
}

function toggleSettings() {
  const chat = document.getElementById('chatSidebar');
  const settings = document.getElementById('settingsSidebar');
  if (!chat.classList.contains('translate-x-full')) chat.classList.add('translate-x-full'); // Скрываем чат, если открыт
  settings.classList.toggle('translate-x-full');
}

function sendChatMessage() {
  const text = document.getElementById('chatInput').value.trim();
  if(text) db.collection("boards").doc(BOARD_ID).collection("chat").add({ text, user: currentUser, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
  document.getElementById('chatInput').value = '';
}

function toggleModal(modalId, show) {
  const el = document.getElementById(modalId);
  if (show) { el.classList.remove('hidden'); setTimeout(() => el.classList.remove('opacity-0'), 10); } 
  else { el.classList.add('opacity-0'); setTimeout(() => el.classList.add('hidden'), 200); }
}

// ==========================================
// ПРОСМОТР КАРТОЧКИ (VIEW)
// ==========================================
function openViewModal(colId, cardId) {
  const col = columns.find(c => c.id === colId); viewingCard = col.cards.find(c => c.id === cardId); currentColumn = colId;
  document.getElementById('viewTitle').innerText = viewingCard.title;
  document.getElementById('viewDescription').innerHTML = viewingCard.description ? marked.parse(viewingCard.description) : '<span class="text-gray-400 italic">Описание отсутствует</span>';
  
  const author = viewingCard.author || { name: 'Аноним', avatar: '' };
  document.getElementById('viewAuthorName').innerText = author.name; document.getElementById('viewAuthorAvatar').src = author.avatar;
  
  document.getElementById('viewTags').innerHTML = (viewingCard.tags || []).map(tId => { const t = AVAILABLE_TAGS.find(tag => tag.id === tId); return t ? `<span class="px-3 py-1 rounded border text-xs font-bold ${t.color}">${t.name}</span>` : ''; }).join('');
  
  const imgEl = document.getElementById('viewImage'); 
  if(viewingCard.image) { imgEl.src = viewingCard.image; imgEl.classList.remove('hidden'); } else imgEl.classList.add('hidden');
  
  renderChecklistView(); // <--- ДОБАВИТЬ ЭТО
  renderCommentsView();
  toggleModal('viewCardModal', true);
}
function closeViewModal() { toggleModal('viewCardModal', false); }

function renderCommentsView() {
  const list = document.getElementById('viewCommentsList');
  list.innerHTML = (viewingCard?.comments || []).length ? viewingCard.comments.map(c => `
    <div class="flex gap-3 bg-gray-50 dark:bg-gray-900/40 p-3.5 rounded-2xl border border-transparent dark:border-gray-800">
      <img src="${c.user.avatar}" class="w-8 h-8 rounded-full flex-shrink-0 mt-0.5 shadow-sm" />
      <div>
        <div class="flex items-center gap-2 mb-1"><span class="font-bold text-xs text-gray-900 dark:text-gray-200">${c.user.name}</span><span class="text-[10px] text-gray-400">${c.time}</span></div>
        <div class="text-sm text-gray-700 dark:text-gray-300 leading-relaxed">${c.text}</div>
      </div>
    </div>
  `).join('') : '<div class="text-gray-400 text-center py-4 bg-gray-50 dark:bg-gray-900/30 rounded-xl">Нет комментариев</div>';
}
function addCommentFromView() {
  const text = document.getElementById('viewCommentInput').value.trim();
  if(!text) return;
  if(!viewingCard.comments) viewingCard.comments = [];
  viewingCard.comments.push({ text, user: currentUser, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
  document.getElementById('viewCommentInput').value = '';
  columns = columns.map(col => { if(col.id === currentColumn) col.cards = col.cards.map(c => c.id === viewingCard.id ? viewingCard : c); return col; });

// ==========================================
// РЕДАКТОР КОЛОНОК
// ==========================================
function addColumn(){ columns.push({ id: Date.now(), name: "Новая колонка", color: 'default', cards: [] }); persist(); }
function openColModal(id){ editingColId = id; const col = columns.find(c => c.id === id); selectedColColor = col.color || 'default'; document.getElementById('colNameInput').value = col.name; renderColorPicker(); toggleModal('colModal', true); }
function closeColModal(){ toggleModal('colModal', false); }
function saveColumn() { columns = columns.map(c => c.id === editingColId ? {...c, name: document.getElementById('colNameInput').value, color: selectedColColor} : c); persist(); closeColModal(); }
function deleteColumn() { columns = columns.filter(c => c.id !== editingColId); persist(); closeColModal(); }
function renderColorPicker() { document.getElementById('colorPicker').innerHTML = Object.entries(COL_COLORS).map(([key, data]) => `<button onclick="selectedColColor='${key}'; renderColorPicker()" class="w-10 h-10 rounded-full border-4 transition-all shadow-sm ${selectedColColor === key ? 'border-gray-900 dark:border-white scale-110 shadow-md' : 'border-transparent'}" style="background-color: ${data.hex};"></button>`).join(''); }

// ==========================================
// РЕДАКТОР КАРТОЧКИ (EDIT) И DRAG-N-DROP КАРТИНКИ
// ==========================================
function openEditModal(colId, cardId = null) {
  currentColumn = colId; 
  editingCard = cardId ? columns.find(c => c.id === colId).cards.find(c => c.id === cardId) : null;
  activeTags = editingCard ? [...(editingCard.tags || [])] : []; 
  pendingImageFile = null;
  
  // ЗАГРУЖАЕМ ЧЕК-ЛИСТ
  activeChecklist = editingCard && editingCard.checklist ? [...editingCard.checklist] : [];
  
  document.getElementById('editTitle').value = editingCard?.title || ''; 
  document.getElementById('editDescription').value = editingCard?.description || '';
  
  // Загружаем дату в календарь
  document.getElementById('editDueDate').value = editingCard?.dueDate || '';
  
  document.getElementById('uploadStatus').innerText = ''; 
  const preview = document.getElementById('editImagePreview');

  if (editingCard?.image) { preview.src = editingCard.image; preview.classList.remove('hidden'); document.getElementById('dropzoneText').classList.add('opacity-0'); } 
  else { preview.classList.add('hidden'); document.getElementById('dropzoneText').classList.remove('opacity-0'); }
  
  renderTagsPicker();
  renderChecklistEdit();
  toggleModal('editCardModal', true);
}
  
function closeEditModal() { toggleModal('editCardModal', false); }

const dropzone = document.getElementById('dropzoneLabel');
dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/20'); };
dropzone.ondragleave = (e) => { e.preventDefault(); dropzone.classList.remove('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/20'); };
dropzone.ondrop = (e) => {
  e.preventDefault(); dropzone.classList.remove('border-blue-500', 'bg-blue-50', 'dark:bg-blue-900/20');
  const file = e.dataTransfer.files[0];
  handleImageSelection(file);
};
document.getElementById('editImage').addEventListener('change', e => handleImageSelection(e.target.files[0]));

function handleImageSelection(file) {
  if(file && file.type.startsWith('image/')) { 
    pendingImageFile = file; 
    document.getElementById('editImagePreview').src = URL.createObjectURL(file); 
    document.getElementById('editImagePreview').classList.remove('hidden'); 
    document.getElementById('dropzoneText').classList.add('opacity-0'); 
  }
}

function renderTagsPicker() { document.getElementById('editTagsContainer').innerHTML = AVAILABLE_TAGS.map(t => `<button onclick="toggleTag('${t.id}')" class="px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${activeTags.includes(t.id) ? 'border-transparent shadow-sm ' + t.color : 'border-gray-200 dark:border-gray-700 text-gray-500 hover:border-gray-400'}">${t.name}</button>`).join(''); }
function toggleTag(tagId) { activeTags.includes(tagId) ? activeTags = activeTags.filter(t => t !== tagId) : activeTags.push(tagId); renderTagsPicker(); }

async function saveCard() {
  let imageUrl = editingCard?.image || null;
  if (pendingImageFile) { 
    document.getElementById('uploadStatus').innerText = 'Загрузка обложки...'; 
    try {
      const fd = new FormData(); fd.append('image', pendingImageFile); 
      const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body: fd }); 
      const data = await res.json(); 
      imageUrl = data.data.url; 
    } catch(e) {
      document.getElementById('uploadStatus').innerText = 'Ошибка загрузки!'; return;
    }
  }
  
const cardObj = { 
    id: editingCard ? editingCard.id : Date.now(), 
    title: document.getElementById('editTitle').value || 'Без названия', 
    description: document.getElementById('editDescription').value, 
    tags: activeTags, 
    image: imageUrl, 
    comments: editingCard?.comments || [], 
    author: editingCard?.author || currentUser,
    dueDate: document.getElementById('editDueDate').value,
    checklist: activeChecklist 
  };
  
  columns = columns.map(col => { if(col.id === currentColumn) { if(editingCard) col.cards = col.cards.map(c => c.id === editingCard.id ? cardObj : c); else col.cards.push(cardObj); } return col; });
  persist(); closeEditModal();
}
  
function deleteCard() { columns = columns.map(col => { if(col.id === currentColumn) col.cards = col.cards.filter(c => c.id !== editingCard.id); return col; }); persist(); closeEditModal(); }

// ==========================================
// ЛОГИКА ЧЕК-ЛИСТОВ
// ==========================================
// 1. Рендер в Редакторе (Создание/Удаление)
function renderChecklistEdit() {
  const container = document.getElementById('editChecklistContainer');
  const progressText = document.getElementById('checklistProgressText');
  const progressBar = document.getElementById('checklistProgressBar');

  if (activeChecklist.length === 0) {
    container.innerHTML = '';
    progressText.innerText = '0%';
    progressBar.style.width = '0%';
    return;
  }

  const doneCount = activeChecklist.filter(i => i.isCompleted).length;
  const percent = Math.round((doneCount / activeChecklist.length) * 100);

  progressText.innerText = `${percent}%`;
  progressBar.style.width = `${percent}%`;
  progressBar.className = percent === 100 ? 'bg-green-500 h-full transition-all duration-300' : 'bg-blue-500 h-full transition-all duration-300';

  container.innerHTML = activeChecklist.map((item, index) => `
    <div class="flex items-center justify-between group bg-white dark:bg-gray-800 p-2 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm">
      <label class="flex items-center gap-3 cursor-pointer flex-1 px-2">
        <input type="checkbox" ${item.isCompleted ? 'checked' : ''} onchange="toggleChecklistItemEdit(${index})" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 accent-blue-500 cursor-pointer" />
        <span class="text-sm ${item.isCompleted ? 'line-through text-gray-400' : 'text-gray-700 dark:text-gray-200'} transition-all">${item.text}</span>
      </label>
      <button onclick="removeChecklistItem(${index})" class="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
    </div>
  `).join('');
  lucide.createIcons();
}

function addChecklistItem() {
  const input = document.getElementById('newChecklistItem');
  const text = input.value.trim();
  if (!text) return;
  activeChecklist.push({ id: Date.now(), text, isCompleted: false });
  input.value = '';
  renderChecklistEdit();
}
function toggleChecklistItemEdit(index) { activeChecklist[index].isCompleted = !activeChecklist[index].isCompleted; renderChecklistEdit(); }
function removeChecklistItem(index) { activeChecklist.splice(index, 1); renderChecklistEdit(); }

// 2. Рендер в Просмотре (Интерактивные галочки)
function renderChecklistView() {
  const container = document.getElementById('viewChecklistContainer');
  if (!viewingCard.checklist || viewingCard.checklist.length === 0) {
    container.innerHTML = ''; return;
  }
  
  const doneCount = viewingCard.checklist.filter(i => i.isCompleted).length;
  const percent = Math.round((doneCount / viewingCard.checklist.length) * 100);
  const colorClass = percent === 100 ? 'bg-green-500' : 'bg-blue-500';

  let html = `
    <div class="mb-2 flex items-center justify-between">
      <h3 class="text-sm font-bold text-gray-900 dark:text-white flex items-center gap-2"><i data-lucide="check-square" class="w-4 h-4 text-blue-500"></i> Чек-лист подзадач</h3>
      <span class="text-xs font-bold text-gray-500">${percent}%</span>
    </div>
    <div class="w-full h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden mb-4">
      <div class="${colorClass} h-full transition-all duration-300" style="width: ${percent}%"></div>
    </div>
    <div class="space-y-2">
  `;

  html += viewingCard.checklist.map((item, index) => `
    <label class="flex items-center gap-3 p-3 bg-gray-50 dark:bg-gray-900/50 hover:bg-gray-100 dark:hover:bg-gray-900 rounded-xl cursor-pointer transition-colors border border-gray-100 dark:border-gray-800">
      <input type="checkbox" ${item.isCompleted ? 'checked' : ''} onchange="toggleChecklistView(${index})" class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500 accent-blue-500 cursor-pointer" />
      <span class="text-sm font-medium ${item.isCompleted ? 'line-through text-gray-400' : 'text-gray-800 dark:text-gray-200'} transition-all">${item.text}</span>
    </label>
  `).join('');
  
  container.innerHTML = html + '</div>';
  lucide.createIcons();
}

function toggleChecklistView(index) {
  viewingCard.checklist[index].isCompleted = !viewingCard.checklist[index].isCompleted;
  columns = columns.map(col => { if(col.id === currentColumn) col.cards = col.cards.map(c => c.id === viewingCard.id ? viewingCard : c); return col; });
  persist(); // Сохраняем в базу (доска обновится автоматически)
  renderChecklistView(); // Перерисовываем галочки в модалке
}
  
// ==========================================
// РЕНДЕР И SORTABLEJS (ОБНОВЛЕННЫЙ)
// ==========================================
function render() {
  const board = document.getElementById('board'); 
  board.innerHTML = '';
  sortableInstances.forEach(inst => inst.destroy()); 
  sortableInstances = [];
  
  columns.forEach(col => {
    const colorStyle = COL_COLORS[col.color] || COL_COLORS['default'];
    const wrap = document.createElement('div'); 
    wrap.dataset.id = col.id; 
    wrap.className = `flex-shrink-0 w-[320px] rounded-2xl border flex flex-col max-h-full shadow-sm bg-gray-100 dark:bg-gray-800/60 ${colorStyle.border}`;
    
    const cardsHtml = col.cards.map(c => {
// 1. Считаем чек-листы для прогресс-бара (Теперь берем из базы, а не Markdown)
      let checklistHtml = '';
      if (c.checklist && c.checklist.length > 0) {
        const total = c.checklist.length;
        const done = c.checklist.filter(i => i.isCompleted).length;
        const percent = Math.round((done / total) * 100);
        const colorClass = done === total ? 'bg-green-500' : 'bg-blue-500';
        checklistHtml = `
          <div class="mt-3 mb-1">
            <div class="flex justify-between items-center text-[10px] font-bold text-gray-400 mb-1.5">
              <span class="flex items-center gap-1"><i data-lucide="check-square" class="w-3 h-3"></i> ${done}/${total}</span>
              <span>${percent}%</span>
            </div>
            <div class="w-full h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
              <div class="${colorClass} h-full transition-all duration-500" style="width: ${percent}%"></div>
            </div>
          </div>
        `;
      }

      // 2. Дедлайны
      let dueDateHtml = '';
      if (c.dueDate) {
        const today = new Date().toISOString().split('T')[0];
        const isOverdue = c.dueDate < today;
        const bgColors = isOverdue ? 'bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400' : 'bg-gray-100 text-gray-500 dark:bg-gray-800 dark:text-gray-400';
        const formattedDate = new Date(c.dueDate).toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        dueDateHtml = `<div class="flex items-center gap-1 text-[10px] font-bold px-2 py-1 rounded-md ${bgColors}"><i data-lucide="clock" class="w-3 h-3"></i> ${formattedDate}</div>`;
      }

      // Остальные элементы
      const tagsHtml = c.tags?.length ? `<div class="flex gap-1 mb-2">${c.tags.map(tId => { const t = AVAILABLE_TAGS.find(tag => tag.id === tId); return t ? `<div class="w-8 h-1.5 rounded-full ${t.color.split(' ')[0]}"></div>` : ''; }).join('')}</div>` : '';
      const commentsCount = c.comments?.length ? `<div class="flex items-center gap-1 text-[11px] font-medium text-gray-400"><i data-lucide="message-square" class="w-3.5 h-3.5"></i> ${c.comments.length}</div>` : '';
      const authorAvatar = c.author ? `<img src="${c.author.avatar}" class="w-5 h-5 rounded-full border border-white dark:border-gray-800 shadow-sm" title="${c.author.name}" />` : '';
      const hasDesc = c.description ? `<i data-lucide="align-left" class="w-3.5 h-3.5 text-gray-400"></i>` : '';

      return `
        <div data-id="${c.id}" onclick="openViewModal(${col.id}, ${c.id})" class="card-item bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-3.5 rounded-xl cursor-grab shadow-sm hover:shadow-md hover:border-blue-400 dark:hover:border-blue-500 transition-all group relative select-none">
          <button onclick="openEditModal(${col.id}, ${c.id}); event.stopPropagation();" class="absolute top-2 right-2 text-gray-400 hover:text-blue-500 opacity-0 group-hover:opacity-100 bg-white dark:bg-gray-800 p-1.5 rounded-lg border dark:border-gray-700 shadow-sm z-10 transition-opacity"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
          
          ${c.image ? `<img src="${c.image}" class="mb-3 rounded-lg w-full h-32 object-cover border border-gray-100 dark:border-gray-700/50 pointer-events-none" />` : ''}
          ${tagsHtml}
          
          <div class="font-bold text-sm leading-snug pr-8 mb-3 text-gray-900 dark:text-white">${c.title}</div>
          
          ${checklistHtml}
          
          <div class="flex justify-between items-end mt-3">
            <div class="flex gap-2 items-center text-gray-400">
              ${dueDateHtml}
              ${hasDesc}
              ${commentsCount}
            </div>
            ${authorAvatar}
          </div>
        </div>
      `;
    }).join('');
    
    wrap.innerHTML = `
      <div class="p-4 border-b border-gray-200/50 dark:border-gray-700/50 flex justify-between items-center col-handle cursor-grab select-none">
        <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full shadow-sm" style="background-color: ${colorStyle.hex}"></div><h2 class="font-bold text-sm text-gray-900 dark:text-white">${col.name}</h2><span class="text-xs font-bold px-2 py-0.5 rounded-full border bg-white/50 dark:bg-black/20 text-gray-600 dark:text-gray-400 border-gray-200/50 dark:border-gray-700/50">${col.cards.length}</span></div>
        <button onclick="openColModal(${col.id})" class="text-gray-400 hover:text-blue-500 p-1 rounded transition-colors"><i data-lucide="more-horizontal" class="w-5 h-5"></i></button>
      </div>
      <div id="cards-${col.id}" ondblclick="quickAddCard(${col.id})" class="p-3 flex-1 overflow-y-auto space-y-3 min-h-[50px] cursor-pointer">${cardsHtml}</div>
      <div class="p-3 pt-0"><button onclick="openEditModal(${col.id})" class="w-full py-2.5 rounded-xl flex items-center justify-center gap-2 text-sm font-bold text-gray-500 hover:text-gray-800 dark:hover:text-white hover:bg-white/50 dark:hover:bg-black/20 transition-colors"><i data-lucide="plus" class="w-4 h-4"></i> Добавить карточку</button></div>
    `;
    board.appendChild(wrap);
    
    sortableInstances.push(new Sortable(document.getElementById(`cards-${col.id}`), { 
      group: 'shared', animation: 150, delay: 100, delayOnTouchOnly: true, ghostClass: 'sortable-ghost', dragClass: 'sortable-drag', forceFallback: true, fallbackTolerance: 5,
      onEnd: function (evt) { 
        let mCard; 
        columns.find(c=>c.id===Number(evt.from.id.replace('cards-',''))).cards = columns.find(c=>c.id===Number(evt.from.id.replace('cards-',''))).cards.filter(c=>{if(c.id===Number(evt.item.dataset.id)){mCard=c;return false;}return true;}); 
        columns.find(c=>c.id===Number(evt.to.id.replace('cards-',''))).cards.splice(evt.newIndex,0,mCard); 
        persist(); 
      } 
    }));
  });
  
  sortableInstances.push(new Sortable(board, { animation: 200, handle: '.col-handle', ghostClass: 'sortable-ghost', dragClass: 'sortable-drag', forceFallback: true, onEnd: function (evt) { columns.splice(evt.newIndex, 0, columns.splice(evt.oldIndex, 1)[0]); persist(); } }));
  lucide.createIcons();
}

// ==========================================
// БЫСТРОЕ ДОБАВЛЕНИЕ (Double Click)
// ==========================================
function quickAddCard(colId) {
  const title = prompt("📝 Название быстрой задачи:");
  if (!title || title.trim() === "") return;
  
  const newCard = { 
    id: Date.now(), 
    title: title.trim(), 
    description: "", 
    tags: [], 
    comments: [], 
    author: currentUser,
    dueDate: ""
  };
  
  columns.find(c => c.id === colId).cards.push(newCard);
  persist();
}

// ==========================================
// НАСТРОЙКИ: ФОН ДОСКИ
// ==========================================
document.getElementById('boardBgUpload').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  
  const statusEl = document.getElementById('bgUploadStatus');
  statusEl.innerText = 'Загрузка обоев...';
  
  try {
    const fd = new FormData(); 
    fd.append('image', file); 
    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body: fd }); 
    const data = await res.json(); 
    
    if(data.success) {
      const bgUrl = data.data.url;
      // Сохраняем фон в базу данных (Real-time сработает у всех!)
      db.collection("boards").doc(BOARD_ID).update({ background: bgUrl });
      statusEl.innerText = 'Готово! 🎉';
      setTimeout(() => statusEl.innerText = '', 3000);
    } else {
      statusEl.innerText = 'Ошибка загрузки :(';
    }
  } catch(err) {
    statusEl.innerText = 'Ошибка соединения';
  }
  // Очищаем инпут, чтобы можно было загрузить ту же картинку еще раз
  e.target.value = '';
});

function resetBoardBackground() {
  // Удаляем поле фона из базы
  db.collection("boards").doc(BOARD_ID).update({ background: firebase.firestore.FieldValue.delete() });
}

// Скролл (Горизонтальный на всю доску)
const mainScroll = document.getElementById('mainScroll'); let isDown=false, startX, scrollLeft;
mainScroll.addEventListener('mousedown', e => { if(e.target.closest('.card-item') || e.target.closest('button')) return; isDown=true; mainScroll.style.cursor='grabbing'; startX=e.pageX-mainScroll.offsetLeft; scrollLeft=mainScroll.scrollLeft; });
mainScroll.addEventListener('mouseleave', () => { isDown=false; mainScroll.style.cursor='grab'; });
mainScroll.addEventListener('mouseup', () => { isDown=false; mainScroll.style.cursor='grab'; });
mainScroll.addEventListener('mousemove', e => { if(!isDown) return; e.preventDefault(); mainScroll.scrollLeft=scrollLeft-(e.pageX-mainScroll.offsetLeft-startX); });
</script>
</body>
</html>
